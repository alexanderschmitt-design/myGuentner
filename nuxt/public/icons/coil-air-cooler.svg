<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background grid -->
  <rect width="400" height="300" fill="#e8e8e8"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#d4d4d4" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#grid)"/>

  <!-- Coil body (vertical fins) -->
  <rect x="140" y="60" width="120" height="180" rx="4" fill="none" stroke="#3a3f50" stroke-width="2"/>
  <line x1="155" y1="60" x2="155" y2="240" stroke="#3a3f50" stroke-width="1.5"/>
  <line x1="170" y1="60" x2="170" y2="240" stroke="#3a3f50" stroke-width="1.5"/>
  <line x1="185" y1="60" x2="185" y2="240" stroke="#3a3f50" stroke-width="1.5"/>
  <line x1="200" y1="60" x2="200" y2="240" stroke="#3a3f50" stroke-width="1.5"/>
  <line x1="215" y1="60" x2="215" y2="240" stroke="#3a3f50" stroke-width="1.5"/>
  <line x1="230" y1="60" x2="230" y2="240" stroke="#3a3f50" stroke-width="1.5"/>
  <line x1="245" y1="60" x2="245" y2="240" stroke="#3a3f50" stroke-width="1.5"/>

  <!-- Inlet pipe (left top) -->
  <line x1="60" y1="100" x2="140" y2="100" stroke="#3a3f50" stroke-width="3"/>
  <line x1="60" y1="120" x2="140" y2="120" stroke="#3a3f50" stroke-width="3"/>
  <line x1="60" y1="100" x2="60" y2="120" stroke="#3a3f50" stroke-width="3"/>

  <!-- Outlet pipe (left bottom) -->
  <line x1="60" y1="190" x2="140" y2="190" stroke="#3a3f50" stroke-width="3"/>
  <line x1="60" y1="210" x2="140" y2="210" stroke="#3a3f50" stroke-width="3"/>
  <line x1="60" y1="190" x2="60" y2="210" stroke="#3a3f50" stroke-width="3"/>

  <!-- Fan symbol (right) -->
  <circle cx="320" cy="150" r="25" fill="none" stroke="#3a3f50" stroke-width="2"/>
  <line x1="260" y1="150" x2="295" y2="150" stroke="#3a3f50" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Fan blades -->
  <path d="M320,125 Q335,150 320,150 Q305,150 320,125Z" fill="#3a3f50" opacity="0.3"/>
  <path d="M320,175 Q305,150 320,150 Q335,150 320,175Z" fill="#3a3f50" opacity="0.3"/>
  <path d="M295,150 Q320,135 320,150 Q320,165 295,150Z" fill="#3a3f50" opacity="0.3"/>
  <path d="M345,150 Q320,165 320,150 Q320,135 345,150Z" fill="#3a3f50" opacity="0.3"/>

  <!-- Flow arrows -->
  <polygon points="115,105 105,100 105,110" fill="#3a3f50"/>
  <polygon points="85,195 75,200 85,205" fill="#3a3f50"/>
</svg>
