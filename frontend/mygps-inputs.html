<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myGPS — Selector Inputs</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header" data-app-header data-active="mygpc"></header>

  <div class="step-wizard" data-mygps-stepwizard="inputs"></div>

  <main class="page-content">
    <div class="container">

      <div class="action-bar">
        <div class="action-bar-left">
          <a data-mygps-prev href="mygps-projects.html" class="btn btn-outline">
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
          </a>
          <button class="btn btn-outline btn-reset" type="button">Reset to Defaults</button>
          <button class="btn btn-outline" type="button">Open Template…</button>
        </div>
        <div class="action-bar-right">
          <a data-mygps-next href="mygps-accessories.html" class="btn btn-primary">
            Next
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      </div>

      <div class="mygps-page-title" data-mygps-category-label></div>

      <div class="mygps-toolbar">
        <select data-mygps-unit-toggle aria-label="Set all units of measure to">
          <option value="us">Set all units of measure to: US</option>
          <option value="si">Set all units of measure to: SI</option>
        </select>
      </div>

      <form id="mygps-inputs-form">

        <div class="mygps-card">
          <h3 class="mygps-section-title">Calculation</h3>

          <div class="mygps-row">
            <label for="calc-mode">Calculation Mode</label>
            <div class="mygps-control">
              <select id="calc-mode">
                <option>Adjust Heat of Rejection</option>
                <option>Fixed Heat of Rejection</option>
                <option>Match Compressor Capacity</option>
              </select>
            </div>
          </div>

          <div class="mygps-row">
            <label>Motor Types to Consider</label>
            <div class="mygps-control mygps-checkbox-list">
              <label><input type="checkbox" checked> EC</label>
              <label><input type="checkbox"> Containerized version</label>
            </div>
          </div>
        </div>

        <div class="mygps-card">
          <h3 class="mygps-section-title">Design Conditions</h3>

          <div class="mygps-row">
            <label for="refrigerant">Refrigerant</label>
            <div class="mygps-control">
              <select id="refrigerant">
                <option>R-717 Ammonia</option>
                <option>R-744 CO2</option>
                <option>R-448A</option>
                <option>R-449A</option>
                <option>R-452A</option>
                <option>R-134a</option>
              </select>
            </div>
          </div>

          <div class="mygps-row">
            <label for="hor">Heat of Rejection</label>
            <div class="mygps-control">
              <input type="number" id="hor" value="5000" step="1">
              <select class="mygps-unit" data-unit-options="capacity"></select>
            </div>
          </div>

          <div class="mygps-row">
            <label for="cond-temp">Condensing Temperature</label>
            <div class="mygps-control">
              <input type="number" id="cond-temp" value="95.0" step="0.1">
              <select class="mygps-unit" data-unit-options="temperature"></select>
            </div>
          </div>

          <div class="mygps-row">
            <label for="wb-temp">Wet Bulb Temp</label>
            <div class="mygps-control">
              <input type="number" id="wb-temp" value="78.0" step="0.1">
              <select class="mygps-unit" data-unit-options="temperature"></select>
            </div>
          </div>

          <div class="mygps-row">
            <label for="elevation">Elevation Above Sea Level</label>
            <div class="mygps-control">
              <input type="number" id="elevation" value="0" step="1">
              <select class="mygps-unit" data-unit-options="length"></select>
            </div>
          </div>
        </div>

        <div class="mygps-card">
          <h3 class="mygps-section-title">Restrictions</h3>

          <div class="mygps-row">
            <label>Number of Units, Min.</label>
            <div class="mygps-control">
              <input type="number" value="1" min="1" style="max-width:120px">
              <span style="color:var(--text-medium);font-size:13px">to</span>
              <input type="number" value="1" min="1" style="max-width:120px">
            </div>
          </div>

          <div class="mygps-row">
            <label>Capacity Tolerance</label>
            <div class="mygps-control">
              <span style="color:var(--text-medium);font-size:13px">%</span>
              <input type="number" value="-2" step="1" style="max-width:120px">
              <span style="color:var(--text-medium);font-size:13px">to</span>
              <span style="color:var(--text-medium);font-size:13px">%</span>
              <input type="number" value="30" step="1" style="max-width:120px">
            </div>
          </div>

          <div class="mygps-row">
            <label for="rank-by">Rank Equipment By</label>
            <div class="mygps-control">
              <select id="rank-by">
                <option>Low First Cost</option>
                <option>Low Operating Cost</option>
                <option>Low Sound Level</option>
                <option>Smallest Footprint</option>
                <option>Best Efficiency</option>
              </select>
            </div>
          </div>

          <div class="mygps-cta-row">
            <a data-mygps-next href="mygps-accessories.html" class="btn btn-primary">Select Equipment</a>
            <a href="mygps-accessories.html" class="btn btn-outline">Consider Specific Model</a>
          </div>
        </div>

      </form>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <a href="admin.html" class="footer-logo">
          <svg class="footer-logo-bars" width="24" height="15" viewBox="0 0 32 20"><rect x="0" y="6" width="3" height="8" rx="1" fill="#39EDB5"/><rect x="5" y="2" width="3" height="16" rx="1" fill="#39EDB5"/><rect x="10" y="4" width="3" height="12" rx="1" fill="#2DC8A0"/><rect x="15" y="0" width="3" height="20" rx="1" fill="#2AAE8C"/><rect x="20" y="6" width="3" height="8" rx="1" fill="#2896E0"/><rect x="25" y="3" width="3" height="14" rx="1" fill="#2666E0"/></svg>
          <span class="footer-logo-text"><span class="logo-my">my</span><span class="logo-name">Güntner</span></span>
        </a>
      </div>
      <div class="footer-right">
        <a href="#">Privacy Policy</a>
        <a href="#">Legal Notice</a>
        <a href="#">Terms &amp; Conditions</a>
        <span class="footer-copyright">Copyright &copy; 2026 G&uuml;ntner GmbH &amp; Co. KG</span>
      </div>
    </div>
  </footer>

  <script src="mygps-flows.js"></script>
  <script src="main.js"></script>
  <script src="mygps.js"></script>
  <script src="site-header.js"></script>
</body>
</html>
