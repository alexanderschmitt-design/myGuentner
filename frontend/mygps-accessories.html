<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myGPS — Options &amp; Accessories</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header" data-app-header data-active="mygpc"></header>

  <div class="step-wizard" data-mygps-stepwizard="accessories"></div>

  <main class="page-content">
    <div class="container">

      <div class="action-bar">
        <div class="action-bar-left">
          <a data-mygps-prev href="mygps-inputs.html" class="btn btn-outline">
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
          </a>
          <button class="btn btn-outline" type="button">Options/Accessories Descriptions</button>
        </div>
        <div class="action-bar-right">
          <a data-mygps-next href="mygps-service.html" class="btn btn-primary">
            Next
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      </div>

      <div class="mygps-page-title" data-mygps-category-label></div>

      <form id="mygps-accessories-form">

        <div class="mygps-card">
          <h3 class="mygps-section-title">Quantity &amp; Model</h3>
          <div class="mygps-row">
            <label for="acc-qty">Quantity &amp; Model</label>
            <div class="mygps-control">
              <input type="number" id="acc-qty" value="1" min="1" style="max-width:90px">
              <select id="acc-model" style="flex:1">
                <option>GCHE 1212-10.2I/020PE</option>
                <option>GCHE 1212-10.2I/024PE</option>
                <option>GCHE 1818-10.2I/030PE</option>
              </select>
            </div>
          </div>
        </div>

        <div class="mygps-card">
          <h3 class="mygps-section-title">Coil &amp; Construction</h3>

          <div class="mygps-row">
            <label>Coil Construction</label>
            <div class="mygps-control mygps-checkbox-list">
              <label><input type="checkbox"> ASME U Stamp</label>
            </div>
          </div>

          <div class="mygps-row">
            <label>Inlet Louvers</label>
            <div class="mygps-control mygps-checkbox-list">
              <label><input type="checkbox"> Cellular</label>
            </div>
          </div>
        </div>

        <div class="mygps-card">
          <h3 class="mygps-section-title">Electrical Supply</h3>

          <div class="mygps-row">
            <label for="elec-supply">Fan Motor Electric Supply</label>
            <div class="mygps-control">
              <select id="elec-supply">
                <option>380-480V/3Ph/50-60Hz</option>
                <option>208-230V/3Ph/60Hz</option>
                <option>460V/3Ph/60Hz</option>
                <option>575V/3Ph/60Hz</option>
              </select>
            </div>
          </div>
        </div>

        <div class="mygps-card">
          <h3 class="mygps-section-title">Water &amp; Pump</h3>

          <div class="mygps-row">
            <label>Water Level Control &amp; Freeze Protection</label>
            <div class="mygps-control mygps-checkbox-list">
              <label><input type="checkbox"> Remote Sump</label>
              <select style="margin-top:6px">
                <option>Mechanical Water Level Control</option>
                <option>Electronic Water Level Control</option>
              </select>
              <label><input type="checkbox"> Immersion Heaters</label>
            </div>
          </div>

          <div class="mygps-row">
            <label>Water Quality Control</label>
            <div class="mygps-control mygps-checkbox-list">
              <label><input type="checkbox" checked> Automatic Purge</label>
              <label style="margin-left:24px"><input type="checkbox"> With Wet Bulb Sensor</label>
            </div>
          </div>

          <div class="mygps-row">
            <label>Pump Electrical Options</label>
            <div class="mygps-control mygps-checkbox-list">
              <label><input type="checkbox"> Single-Point Power — Pump Protection &amp; Contactor Integrated</label>
              <label><input type="checkbox"> Separate Pump Disconnect</label>
            </div>
          </div>
        </div>

        <div class="mygps-card">
          <h3 class="mygps-section-title">Protection &amp; Control</h3>

          <div class="mygps-row">
            <label>Fan Motor Protection &amp; Control</label>
            <div class="mygps-control mygps-checkbox-list">
              <label><input type="checkbox" checked> Electrical Protection (MSP &amp; Disconnect)</label>
              <label><input type="checkbox"> Modbus</label>
              <div style="display:flex;align-items:center;gap:14px;margin-top:6px">
                <span style="color:var(--text-medium);font-size:13px">Enclosure:</span>
                <label><input type="radio" name="enclosure" checked> Fiber-Reinforced Plastic</label>
                <label><input type="radio" name="enclosure"> Stainless Steel</label>
              </div>
            </div>
          </div>

          <div class="mygps-row">
            <label>Unit Electrical Protection</label>
            <div class="mygps-control mygps-checkbox-list">
              <label><input type="checkbox"> High Voltage Protection</label>
              <label><input type="checkbox"> Surge Protection Device</label>
              <label><input type="checkbox"> Phase Loss Monitor</label>
            </div>
          </div>
        </div>

      </form>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <a href="admin.html" class="footer-logo">
          <svg class="footer-logo-bars" width="24" height="15" viewBox="0 0 32 20"><rect x="0" y="6" width="3" height="8" rx="1" fill="#39EDB5"/><rect x="5" y="2" width="3" height="16" rx="1" fill="#39EDB5"/><rect x="10" y="4" width="3" height="12" rx="1" fill="#2DC8A0"/><rect x="15" y="0" width="3" height="20" rx="1" fill="#2AAE8C"/><rect x="20" y="6" width="3" height="8" rx="1" fill="#2896E0"/><rect x="25" y="3" width="3" height="14" rx="1" fill="#2666E0"/></svg>
          <span class="footer-logo-text"><span class="logo-my">my</span><span class="logo-name">Güntner</span></span>
        </a>
      </div>
      <div class="footer-right">
        <a href="#">Privacy Policy</a>
        <a href="#">Legal Notice</a>
        <a href="#">Terms &amp; Conditions</a>
        <span class="footer-copyright">Copyright &copy; 2026 G&uuml;ntner GmbH &amp; Co. KG</span>
      </div>
    </div>
  </footer>

  <script src="mygps-flows.js"></script>
  <script src="main.js"></script>
  <script src="mygps.js"></script>
  <script src="site-header.js"></script>
</body>
</html>
