<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myGPC — DC Guided Configuration</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ============================================================
       DC Guided Configuration — aligned with myGPC design system
       Uses brand tokens (--primary, --text-*, --border-light, --radius-*)
       and Inter typography from styles.css
       ============================================================ */
    .dc-wizard {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      background: var(--surface-white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-top: 20px;
    }

    /* ----- Sub-stepper (horizontal pill above the wizard body) ----- */
    .dc-substepper {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 16px 24px;
      background: var(--surface-white);
      border-bottom: 1px solid var(--border-light);
      overflow-x: auto;
    }
    .dc-st { display: flex; align-items: center; flex-shrink: 0; }
    .dc-st-dot {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--surface-white);
      border: 1.5px solid var(--border-extra-dark);
      display: inline-flex; align-items: center; justify-content: center;
      font-family: var(--font); font-size: 12px; font-weight: 500;
      color: var(--text-light);
      cursor: pointer;
      transition: all var(--transition);
    }
    .dc-st-dot:hover { border-color: var(--primary); color: var(--primary); }
    .dc-st-dot.done {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--text-inverted);
    }
    .dc-st-dot.active {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--text-inverted);
      box-shadow: 0 0 0 4px rgba(38, 102, 224, .12);
    }
    .dc-st-label {
      font-family: var(--font);
      font-size: 13px; font-weight: 400;
      color: var(--text-light);
      margin: 0 8px;
      letter-spacing: 0.14px;
      white-space: nowrap;
    }
    .dc-st-label.active { color: var(--text-dark); font-weight: 500; }
    .dc-st-label.done   { color: var(--text-medium); }
    .dc-st-line {
      width: 28px; height: 1px;
      background: var(--border-extra-dark);
      flex-shrink: 0;
    }
    .dc-st-line.done { background: var(--primary); }

    /* ----- Side navigation ----- */
    .dc-sidenav {
      padding: 20px 16px;
      background: var(--surface-canvas);
      border-right: 1px solid var(--border-light);
    }
    .dc-sidenav-title {
      font-family: var(--font);
      font-size: 11px; font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .dc-lnav-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px;
      border-radius: var(--radius-sm);
      margin-bottom: 4px;
      cursor: pointer;
      transition: background var(--transition);
    }
    .dc-lnav-item:hover { background: var(--surface-white); }
    .dc-lnav-item.active {
      background: var(--surface-white);
      box-shadow: inset 3px 0 0 var(--primary);
    }
    .dc-lnav-icon {
      width: 28px; height: 28px;
      border-radius: var(--radius-sm);
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      background: var(--surface-white);
      border: 1px solid var(--border-light);
      color: var(--text-medium);
    }
    .dc-lnav-item.active .dc-lnav-icon {
      background: var(--primary-light);
      border-color: var(--primary-light);
      color: var(--primary);
    }
    .dc-lnav-text { flex: 1; min-width: 0; }
    .dc-lnav-name {
      font-family: var(--font);
      font-size: 13px; font-weight: 500;
      color: var(--text-dark);
      line-height: 18px;
    }
    .dc-lnav-item.active .dc-lnav-name { color: var(--primary); }
    .dc-lnav-sub {
      font-family: var(--font);
      font-size: 11px; color: var(--text-light);
      margin-top: 1px;
    }
    .dc-lnav-badge {
      font-family: var(--font);
      font-size: 10px; font-weight: 500;
      padding: 1px 7px; border-radius: 10px;
      margin-top: 4px; display: inline-block;
      letter-spacing: 0.3px;
    }
    .dc-lb-done   { background: rgba(0, 200, 151, .12); color: #00755a; }
    .dc-lb-active { background: var(--primary-light); color: var(--primary-dark); }
    .dc-lb-open   { background: var(--surface-gray-light); color: var(--text-light); }

    /* ----- Right content panel ----- */
    .dc-content { padding: 24px 28px; }

    .dc-step-head { margin-bottom: 18px; }
    .dc-step-title {
      font-family: var(--font);
      font-size: 20px; font-weight: 500;
      color: var(--text-dark);
      letter-spacing: 0.2px;
      margin-bottom: 4px;
    }
    .dc-step-desc {
      font-family: var(--font);
      font-size: 14px; line-height: 1.55;
      color: var(--text-medium);
    }
    .dc-progress-bar {
      height: 3px;
      background: var(--border-light);
      border-radius: 2px;
      margin: 14px 0 4px;
      overflow: hidden;
    }
    .dc-progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      transition: width .3s ease;
    }

    /* ----- Form primitives ----- */
    .dc-field-group { margin-bottom: 18px; }
    .dc-field-label {
      font-family: var(--font);
      font-size: 13px; font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .dc-field-hint {
      font-family: var(--font);
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }
    .dc-row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .dc-input,
    .dc-select {
      width: 100%; max-width: 100%;
      box-sizing: border-box;
      height: 36px;
      padding: 0 10px;
      font-family: var(--font);
      font-size: 13.5px;
      color: var(--text-dark);
      background: var(--surface-white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xs);
      outline: none;
      transition: border-color var(--transition);
    }
    .dc-input:focus, .dc-select:focus { border-color: var(--primary); }
    .dc-input-with-unit {
      display: inline-flex; align-items: center; gap: 8px;
    }
    .dc-input-with-unit .dc-input { width: 96px; }
    .dc-unit {
      font-family: var(--font);
      font-size: 12.5px;
      color: var(--text-medium);
    }
    .dc-tag-inline {
      font-family: var(--font);
      font-size: 10px; font-weight: 500;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: 0.3px;
    }
    .dc-tag-auto { background: var(--primary-light); color: var(--primary-dark); }
    .dc-tag-calc { background: rgba(0, 200, 151, .14); color: #00755a; }

    /* ----- Preset cards ----- */
    .dc-preset-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 6px;
    }
    .dc-preset-card {
      display: flex; flex-direction: column; gap: 4px;
      padding: 12px 14px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: var(--surface-white);
      transition: border-color var(--transition), background var(--transition);
    }
    .dc-preset-card:hover {
      border-color: var(--primary);
      background: rgba(38, 102, 224, .04);
    }
    .dc-preset-card.sel {
      border-color: var(--primary);
      background: rgba(38, 102, 224, .06);
      box-shadow: 0 0 0 1px var(--primary);
    }
    .dc-preset-icon {
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--primary);
      margin-bottom: 2px;
    }
    .dc-preset-name {
      font-family: var(--font);
      font-size: 13px; font-weight: 500;
      color: var(--text-dark);
    }
    .dc-preset-sub {
      font-family: var(--font);
      font-size: 12px; color: var(--text-medium);
    }

    /* ----- Toggle pills ----- */
    .dc-togrow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .dc-tg {
      padding: 7px 14px;
      font-family: var(--font);
      font-size: 12.5px; font-weight: 500;
      color: var(--text-medium);
      background: var(--surface-white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xs);
      cursor: pointer;
      transition: all var(--transition);
    }
    .dc-tg:hover { border-color: var(--primary); color: var(--primary); }
    .dc-tg.on {
      background: var(--primary);
      border-color: var(--primary);
      color: var(--text-inverted);
    }

    /* ----- Field rows (sliders) ----- */
    .dc-field-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      background: var(--surface-canvas);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
    }
    .dc-fr-icon {
      flex-shrink: 0; width: 18px; height: 18px;
      color: var(--text-light);
    }
    .dc-fr-label {
      flex: 1;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-dark);
    }
    .dc-field-row input[type=range] {
      width: 120px; accent-color: var(--primary);
    }
    .dc-fr-value {
      font-family: var(--font);
      font-size: 13px; font-weight: 500;
      color: var(--primary);
      min-width: 60px; text-align: right;
    }

    /* ----- Alerts ----- */
    .dc-alert {
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px; line-height: 1.55;
      margin-bottom: 12px;
      border: 1px solid transparent;
    }
    .dc-alert-blue   { background: rgba(38, 102, 224, .06); color: var(--primary-dark); border-color: rgba(38, 102, 224, .2); }
    .dc-alert-green  { background: rgba(0, 200, 151, .08); color: #00755a; border-color: rgba(0, 200, 151, .25); }
    .dc-alert-amber  { background: rgba(255, 174, 0, .08); color: #8a5d00; border-color: rgba(255, 174, 0, .35); }

    .dc-divider {
      height: 1px; background: var(--border-light);
      margin: 16px 0;
    }

    /* ----- Chatbot inline hint ----- */
    .dc-chat-hint {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 10px 14px;
      background: rgba(38, 102, 224, .05);
      border: 1px solid rgba(38, 102, 224, .15);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px; color: var(--primary-dark); line-height: 1.5;
      margin-bottom: 16px;
    }
    .dc-chat-hint svg { flex-shrink: 0; color: var(--primary); margin-top: 1px; }

    /* ----- Result cards ----- */
    .dc-result-unit {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      background: var(--surface-white);
      transition: border-color var(--transition);
    }
    .dc-result-unit:hover { border-color: var(--primary); }
    .dc-result-unit--rec {
      border-color: var(--primary);
      background: rgba(38, 102, 224, .04);
      box-shadow: 0 0 0 1px var(--primary);
    }
    .dc-ru-rank {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-family: var(--font);
      font-size: 12px; font-weight: 600;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .dc-result-unit--rec .dc-ru-rank {
      background: var(--primary);
      color: var(--text-inverted);
    }
    .dc-ru-body { flex: 1; min-width: 0; }
    .dc-ru-name {
      font-family: var(--font);
      font-size: 14px; font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 6px;
    }
    .dc-ru-meta {
      font-family: var(--font);
      font-size: 12px; font-weight: 400;
      color: var(--primary);
      margin-left: 8px;
    }
    .dc-ru-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .dc-ru-tag {
      font-family: var(--font);
      font-size: 11.5px; font-weight: 500;
      padding: 3px 8px;
      border-radius: 10px;
      letter-spacing: 0.2px;
    }
    .dc-rt-match { background: rgba(0, 200, 151, .12); color: #00755a; }
    .dc-rt-pue   { background: var(--primary-light); color: var(--primary-dark); }
    .dc-rt-spl   { background: rgba(155, 130, 240, .15); color: #463f7d; }
    .dc-rt-sim   { background: rgba(255, 174, 0, .12); color: #8a5d00; }

    /* ----- DC Top context strip (model + cooling tag) ----- */
    .dc-context-strip {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      background: var(--surface-canvas);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .dc-context-model {
      font-family: var(--font);
      font-size: 13px; font-weight: 500;
      color: var(--text-dark);
      letter-spacing: 0.2px;
    }
    .dc-context-model code {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12.5px;
      color: var(--primary);
      background: var(--surface-white);
      border: 1px solid var(--border-light);
      padding: 2px 8px;
      border-radius: var(--radius-xs);
      margin-left: 8px;
    }
    .dc-badge-dc {
      font-family: var(--font);
      font-size: 11px; font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      background: var(--primary-light);
      color: var(--primary-dark);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ----- Page heading row reuses .ds-product-header pattern ----- */

    /* ----- Responsive ----- */
    @media (max-width: 900px) {
      .dc-wizard { grid-template-columns: 1fr; }
      .dc-sidenav {
        border-right: none;
        border-bottom: 1px solid var(--border-light);
      }
      .dc-row2,
      .dc-preset-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header" data-app-header data-active="mygpc"></header>

  <!-- ===== STEP WIZARD (standard 5-step app flow) ===== -->
  <div class="step-wizard">
    <div class="container">
      <div class="step-wizard-inner">
        <a href="index.html" class="step-item completed">
          <span class="step-dot"></span>
          <span class="step-label">Category</span>
        </a>
        <div class="step-connector completed"></div>
        <a href="dc-guided-config.html" class="step-item active">
          <span class="step-dot"></span>
          <span class="step-label">Thermodynamics</span>
        </a>
        <div class="step-connector"></div>
        <a href="unit-selection.html" class="step-item upcoming">
          <span class="step-dot"></span>
          <span class="step-label">Unit Selection</span>
        </a>
        <div class="step-connector"></div>
        <a href="results.html" class="step-item upcoming">
          <span class="step-dot"></span>
          <span class="step-label">Results</span>
        </a>
        <div class="step-connector"></div>
        <a href="datasheet.html" class="step-item upcoming">
          <span class="step-dot"></span>
          <span class="step-label">Datasheet</span>
        </a>
      </div>
    </div>
  </div>

  <!-- ===== PAGE CONTENT ===== -->
  <main class="page-content">
    <div class="container">

      <!-- Top action bar — Back / Next ===== -->
      <div class="action-bar">
        <div class="action-bar-left">
          <a href="index.html" class="btn btn-outline">
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
          </a>
        </div>
        <div class="action-bar-right">
          <a href="datasheet.html" class="btn btn-primary" id="dc-action-next">
            Next
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      </div>

      <!-- Page Header (Datasheet-style) -->
      <div class="ds-product-header">
        <div class="ds-product-header-left">
          <h1 class="ds-product-title">Data Center Cooling</h1>
          <h2 class="ds-product-subtitle">DCHD 213.1 1x5/08RA-1500L/02P.M</h2>
        </div>
        <div class="ds-product-actions">
          <span class="dc-badge-dc">Guided · Expert mode</span>
        </div>
      </div>

      <!-- Wizard -->
      <div class="dc-wizard">

        <!-- Sub stepper -->
        <div class="dc-substepper" id="dc-stepper"></div>

        <!-- Side nav -->
        <aside class="dc-sidenav">
          <div class="dc-sidenav-title">Configuration steps</div>
          <div id="dc-lnav"></div>
        </aside>

        <!-- Right content -->
        <section class="dc-content" id="dc-right-content"></section>
      </div>

      <!-- Bottom action bar — Back / Continue (mirrors top) -->
      <div class="action-bar" style="margin-top: 24px;">
        <div class="action-bar-left">
          <button type="button" class="btn btn-outline" id="dc-btn-back" onclick="dcNav(-1)">
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back

        <div class="action-bar-center">
          <span id="dc-foot-hint" style="font-family: var(--font); font-size: 13px; color: var(--text-light);"></span>
        </div>

          <button type="button" class="btn btn-primary" id="dc-btn-next" onclick="dcNav(1)">

            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">

  <script>
    // ===== DC Guided Configuration Wizard =====
    // Line-stroke SVG icons (consistent with the rest of the app: stroke-width 2, no fill).
    const dcIcons = {
      profile: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="8" rx="2"/><rect x="2" y="13" width="20" height="8" rx="2"/><line x1="6" y1="7" x2="6.01" y2="7"/><line x1="6" y1="17" x2="6.01" y2="17"/></svg>',
      load:    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
      climate: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4 4 0 1 0 5 0z"/></svg>',
      fluid:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>',
      sound:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>',
      results: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    };
    const dcChatIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
    const dcPresetIcon = (path) => `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;

    const dcSteps = [
      {
        id: 'profile', name: 'DC profile', sub: 'Preset & use case',
        title: 'Choose your data center profile',
        desc: 'Select a preset that matches your project. Parameters are pre-filled based on ASHRAE standards and can be adjusted in later steps.',
        content: () => `
          <div class="dc-chat-hint">${dcChatIcon}<div>Not sure which profile fits? I can help you identify the right ASHRAE climate class and redundancy mode for your site &mdash; just describe your project.</div></div>
          <div class="dc-field-group">
            <div class="dc-field-label">Project type</div>
            <div class="dc-preset-grid">
              <div class="dc-preset-card sel" onclick="dcSelPreset(this)">
                <div class="dc-preset-icon">${dcPresetIcon('<rect x="2" y="3" width="20" height="8" rx="2"/><rect x="2" y="13" width="20" height="8" rx="2"/><line x1="6" y1="7" x2="6.01" y2="7"/><line x1="6" y1="17" x2="6.01" y2="17"/>')}</div>
                <div class="dc-preset-name">Edge / Branch DC</div>
                <div class="dc-preset-sub">up to 100 kW IT load</div>
              </div>
              <div class="dc-preset-card" onclick="dcSelPreset(this)">
                <div class="dc-preset-icon">${dcPresetIcon('<path d="M3 21V5l9-3 9 3v16"/><path d="M9 21V11h6v10"/><line x1="6" y1="9" x2="6.01" y2="9"/><line x1="18" y1="9" x2="18.01" y2="9"/>')}</div>
                <div class="dc-preset-name">Mid-size DC</div>
                <div class="dc-preset-sub">100 kW &ndash; 2 MW</div>
              </div>
              <div class="dc-preset-card" onclick="dcSelPreset(this)">
                <div class="dc-preset-icon">${dcPresetIcon('<path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>')}</div>
                <div class="dc-preset-name">Hyperscale</div>
                <div class="dc-preset-sub">2 MW+ &middot; cloud-scale</div>
              </div>
              <div class="dc-preset-card" onclick="dcSelPreset(this)">
                <div class="dc-preset-icon">${dcPresetIcon('<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>')}</div>
                <div class="dc-preset-name">Modular DC</div>
                <div class="dc-preset-sub">Container / prefab</div>
              </div>
            </div>
          </div>
          <div class="dc-row2" style="margin-top:12px">
            <div class="dc-field-group">
              <div class="dc-field-label">ASHRAE climate class <span class="dc-tag-inline dc-tag-auto">auto-set</span></div>
              <select class="dc-select"><option>A1 &mdash; 15&ndash;32 &deg;C, 20&ndash;80 % rH</option><option>A2 &mdash; 10&ndash;35 &deg;C</option><option>A3 &mdash; 5&ndash;40 &deg;C</option><option>A4 &mdash; 5&ndash;45 &deg;C</option></select>
              <div class="dc-field-hint">Sets ambient dry-bulb envelope for calculation</div>
            </div>
            <div class="dc-field-group">
              <div class="dc-field-label">Redundancy mode</div>
              <div class="dc-togrow">
                <div class="dc-tg on" onclick="dcTog(this)">N+1</div>
                <div class="dc-tg" onclick="dcTog(this)">2N</div>
                <div class="dc-tg" onclick="dcTog(this)">N</div>
              </div>
              <div class="dc-field-hint">Affects number of units and individual capacity</div>
            </div>
          </div>
        `
      },
      {
        id: 'load', name: 'IT load', sub: 'Capacity & profile',
        title: 'Define IT load and capacity',
        desc: 'Enter the total IT load and expected load profile. The system calculates individual unit capacity based on your redundancy mode.',
        content: () => `
          <div class="dc-alert dc-alert-blue">Based on your N+1 profile: 3 units &times; 40 kW each = 120 kW total (100 kW active + 40 kW standby)</div>
          <div class="dc-row2">
            <div class="dc-field-group">
              <div class="dc-field-label">Total IT load</div>
              <div class="dc-input-with-unit"><input class="dc-input" type="number" value="100"> <span class="dc-unit">kW</span></div>
              <div class="dc-field-hint">Active IT power at peak load</div>
            </div>
            <div class="dc-field-group">
              <div class="dc-field-label">PUE target</div>
              <div class="dc-input-with-unit"><input class="dc-input" type="number" value="1.3" step="0.05"> <span class="dc-unit">&le;</span></div>
              <div class="dc-field-hint">Filters units by energy efficiency</div>
            </div>
          </div>
          <div class="dc-field-group">
            <div class="dc-field-label">Load profile</div>
            <div class="dc-field-row">
              <svg class="dc-fr-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              <span class="dc-fr-label">Night load (00:00&ndash;06:00)</span>
              <input type="range" min="10" max="100" value="30">
              <span class="dc-fr-value">30 %</span>
            </div>
            <div class="dc-field-row">
              <svg class="dc-fr-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              <span class="dc-fr-label">Day load (06:00&ndash;22:00)</span>
              <input type="range" min="10" max="100" value="80">
              <span class="dc-fr-value">80 %</span>
            </div>
            <div class="dc-field-row">
              <svg class="dc-fr-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              <span class="dc-fr-label">Peak load (max. 2h/day)</span>
              <input type="range" min="10" max="100" value="100">
              <span class="dc-fr-value">100 %</span>
            </div>
            <div class="dc-field-hint">Used for part-load energy calculation and fan speed optimization</div>
          </div>
        `
      },
      {
        id: 'climate', name: 'Climate', sub: 'Ambient conditions',
        title: 'Ambient and climate conditions',
        desc: 'Define the installation site climate. Wet-bulb temperature is required for adiabatic pre-cooling options.',
        content: () => `
          <div class="dc-row2">
            <div class="dc-field-group">
              <div class="dc-field-label">Dry-bulb design temp.</div>
              <div class="dc-input-with-unit"><input class="dc-input" type="number" value="35"> <span class="dc-unit">&deg;C</span></div>
              <div class="dc-field-hint">Summer design peak (ASHRAE 0.4 %)</div>
            </div>
            <div class="dc-field-group">
              <div class="dc-field-label">Wet-bulb temperature</div>
              <div class="dc-input-with-unit"><input class="dc-input" type="number" value="23"> <span class="dc-unit">&deg;C</span></div>
              <div class="dc-field-hint">Required for adiabatic options</div>
            </div>
          </div>
          <div class="dc-field-group">
            <div class="dc-field-label">Installation</div>
            <div class="dc-togrow">
              <div class="dc-tg on" onclick="dcTog(this)">Outdoor</div>
              <div class="dc-tg" onclick="dcTog(this)">Indoor (plant room)</div>
              <div class="dc-tg" onclick="dcTog(this)">Rooftop</div>
            </div>
          </div>
          <div class="dc-divider"></div>
          <div class="dc-field-group">
            <div class="dc-field-label">Cooling mode</div>
            <div class="dc-row2" style="margin-top:6px">
              <div class="dc-preset-card sel" onclick="dcSelPreset(this)">
                <div class="dc-preset-name">Dry cooler</div>
                <div class="dc-preset-sub">Air-to-fluid &middot; no water consumption</div>
              </div>
              <div class="dc-preset-card" onclick="dcSelPreset(this)">
                <div class="dc-preset-name">Adiabatic</div>
                <div class="dc-preset-sub">Wet-bulb advantage &middot; lower PUE</div>
              </div>
            </div>
          </div>
          <div class="dc-alert dc-alert-amber" style="margin-top:12px">At 35 &deg;C dry-bulb: adiabatic pre-cooling can reduce required unit capacity by ~18 %. <strong>Recommend verifying wet-bulb availability at site.</strong></div>
        `
      },
      {
        id: 'fluid', name: 'Fluid circuit', sub: 'Working fluid & temps',
        title: 'Fluid circuit and temperatures',
        desc: 'Configure the hydraulic circuit. Glycol mixture and ΔT are validated against freeze protection and unit operating limits.',
        content: () => `
          <div class="dc-row2">
            <div class="dc-field-group">
              <div class="dc-field-label">Working fluid</div>
              <select class="dc-select"><option>Water</option><option selected>Water / Glycol 30 %</option><option>Water / Glycol 40 %</option><option>Water / Glycol 50 %</option></select>
              <div class="dc-field-hint">Freeze protection to &minus;15 &deg;C @ 30 %</div>
            </div>
            <div class="dc-field-group">
              <div class="dc-field-label">ΔT target</div>
              <div class="dc-input-with-unit"><input class="dc-input" type="number" value="10"> <span class="dc-unit">K</span></div>
              <div class="dc-field-hint">Supply / return differential</div>
            </div>
          </div>
          <div class="dc-row2">
            <div class="dc-field-group">
              <div class="dc-field-label">Supply temperature</div>
              <div class="dc-input-with-unit"><input class="dc-input" type="number" value="40"> <span class="dc-unit">&deg;C</span></div>
            </div>
            <div class="dc-field-group">
              <div class="dc-field-label">Return temperature <span class="dc-tag-inline dc-tag-calc">calculated</span></div>
              <div class="dc-input-with-unit"><input class="dc-input" type="number" value="50" disabled style="opacity:.6"> <span class="dc-unit">&deg;C</span></div>
            </div>
          </div>
          <div class="dc-alert dc-alert-blue">Flow rate: approx. 8.6 m&sup3;/h per unit at selected ΔT and 40 kW capacity.</div>
          <div class="dc-field-group">
            <div class="dc-field-label">Inhibitor / water quality</div>
            <div class="dc-togrow">
              <div class="dc-tg on" onclick="dcTog(this)">Standard inhibitor</div>
              <div class="dc-tg" onclick="dcTog(this)">Customer spec</div>
              <div class="dc-tg" onclick="dcTog(this)">Not specified</div>
            </div>
            <div class="dc-field-hint">Affects corrosion protection recommendation in datasheet</div>
          </div>
        `
      },
      {
        id: 'sound', name: 'Sound & fan', sub: 'EC fan · SPL',
        title: 'Fan configuration and sound limits',
        desc: 'EC fans allow variable speed operation across all load profiles — optimizing PUE and staying within site noise limits.',
        content: () => `
          <div class="dc-row2">
            <div class="dc-field-group">
              <div class="dc-field-label">Fan type</div>
              <div class="dc-togrow">
                <div class="dc-tg on" onclick="dcTog(this)">EC (variable speed)</div>
                <div class="dc-tg" onclick="dcTog(this)">AC (fixed speed)</div>
              </div>
              <div class="dc-field-hint">EC recommended for DC &mdash; enables part-load PUE gains</div>
            </div>
            <div class="dc-field-group">
              <div class="dc-field-label">Max. sound pressure level</div>
              <div class="dc-input-with-unit"><input class="dc-input" type="number" value="65"> <span class="dc-unit">dB(A) @ 10m</span></div>
              <div class="dc-field-hint">Filters units exceeding site noise limit</div>
            </div>
          </div>
          <div class="dc-alert dc-alert-green">At 30 % night load, EC fan reduces power consumption by ~60 % vs. fixed speed. Estimated annual energy saving: 12,400 kWh per unit.</div>
          <div class="dc-field-group">
            <div class="dc-field-label">IP protection class required</div>
            <div class="dc-togrow">
              <div class="dc-tg on" onclick="dcTog(this)">IP44</div>
              <div class="dc-tg" onclick="dcTog(this)">IP54</div>
              <div class="dc-tg" onclick="dcTog(this)">IP55</div>
              <div class="dc-tg" onclick="dcTog(this)">Not specified</div>
            </div>
          </div>
        `
      },
      {
        id: 'results', name: 'Results', sub: 'Units & similarity',
        title: 'Recommended units',
        desc: 'Ranked by PUE fit, sound compliance and similarity to already-produced units. Select a unit to generate the proposal.',
        content: () => `
          <div class="dc-alert dc-alert-blue">3 units required (N+1 &middot; 40 kW each). Showing best matches for your configuration.</div>
          <div class="dc-result-unit dc-result-unit--rec">
            <div class="dc-ru-rank">1</div>
            <div class="dc-ru-body">
              <div class="dc-ru-name">DCHD 213.1 1x5/08RA-1500L/02P.M <span class="dc-ru-meta">&rarr; recommended</span></div>
              <div class="dc-ru-tags">
                <span class="dc-ru-tag dc-rt-match">98 % config match</span>
                <span class="dc-ru-tag dc-rt-pue">PUE contribution 1.08</span>
                <span class="dc-ru-tag dc-rt-spl">61 dB(A) @ 10m</span>
                <span class="dc-ru-tag dc-rt-sim">Already produced &times;4</span>
              </div>
            </div>
            <a href="datasheet.html" class="btn btn-primary">Select</a>
          </div>
          <div class="dc-result-unit">
            <div class="dc-ru-rank">2</div>
            <div class="dc-ru-body">
              <div class="dc-ru-name">DCHD 213.1 1x5/08LA-1800L/EC</div>
              <div class="dc-ru-tags">
                <span class="dc-ru-tag dc-rt-match">91 % config match</span>
                <span class="dc-ru-tag dc-rt-pue">PUE contribution 1.07</span>
                <span class="dc-ru-tag dc-rt-spl">63 dB(A) @ 10m</span>
                <span class="dc-ru-tag dc-rt-sim">Already produced &times;7</span>
              </div>
            </div>
            <a href="datasheet.html" class="btn btn-outline">Select</a>
          </div>
          <div class="dc-result-unit">
            <div class="dc-ru-rank">3</div>
            <div class="dc-ru-body">
              <div class="dc-ru-name">DCHD 175.1 1x4/06LA-1500L/EC</div>
              <div class="dc-ru-tags">
                <span class="dc-ru-tag dc-rt-match">78 % config match</span>
                <span class="dc-ru-tag dc-rt-pue">PUE contribution 1.12</span>
                <span class="dc-ru-tag dc-rt-spl">58 dB(A) @ 10m</span>
                <span class="dc-ru-tag dc-rt-sim">Not yet produced</span>
              </div>
            </div>
            <a href="datasheet.html" class="btn btn-outline">Select</a>
          </div>
        `
      }
    ];

    let dcCur = 0;

    function dcRender() {
      const s = dcSteps[dcCur];

      // sub-stepper
      let st = '';
      dcSteps.forEach((x, i) => {
        const done = i < dcCur, act = i === dcCur;
        st += `<div class="dc-st"><div class="dc-st-dot ${done?'done':act?'active':''}" onclick="dcJump(${i})">${done?'&#10003;':i+1}</div><span class="dc-st-label ${done?'done':act?'active':''}">${x.name}</span></div>`;
        if (i < dcSteps.length - 1) st += `<div class="dc-st-line ${done?'done':''}"></div>`;
      });
      document.getElementById('dc-stepper').innerHTML = st;

      // left nav
      let ln = '';
      dcSteps.forEach((x, i) => {
        const done = i < dcCur, act = i === dcCur;
        ln += `<div class="dc-lnav-item ${act?'active':''}" onclick="dcJump(${i})">
          <div class="dc-lnav-icon">${dcIcons[x.id]}</div>
          <div class="dc-lnav-text">
            <div class="dc-lnav-name">${x.name}</div>
            <div class="dc-lnav-sub">${x.sub}</div>
            <span class="dc-lnav-badge ${done?'dc-lb-done':act?'dc-lb-active':'dc-lb-open'}">${done?'done':act?'active':'pending'}</span>
          </div>
        </div>`;
      });
      document.getElementById('dc-lnav').innerHTML = ln;

      // right
      const pct = Math.round((dcCur / (dcSteps.length - 1)) * 100);
      document.getElementById('dc-right-content').innerHTML = `
        <div class="dc-step-head">
          <div class="dc-step-title">${s.title}</div>
          <div class="dc-step-desc">${s.desc}</div>
          <div class="dc-progress-bar"><div class="dc-progress-fill" style="width:${pct}%"></div></div>
        </div>
        ${s.content()}
      `;

      // buttons
      const back = document.getElementById('dc-btn-back');
      back.style.opacity = dcCur === 0 ? '0.4' : '1';
      back.style.pointerEvents = dcCur === 0 ? 'none' : 'auto';
      document.getElementById('dc-btn-next-label').textContent = dcCur === dcSteps.length - 1 ? 'Send to Sales' : 'Continue';
      document.getElementById('dc-foot-hint').textContent = `Step ${dcCur+1} of ${dcSteps.length}`;

      // range live update (scoped to wizard)
      document.querySelectorAll('.dc-content input[type=range]').forEach(r => {
        r.oninput = function() {
          if (this.nextElementSibling) this.nextElementSibling.textContent = this.value + ' %';
        };
      });
    }

    function dcNav(d) { dcCur = Math.max(0, Math.min(dcSteps.length - 1, dcCur + d)); dcRender(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function dcJump(i) { dcCur = i; dcRender(); }
    function dcSelPreset(el) { el.closest('.dc-preset-grid, .dc-row2')?.querySelectorAll('.dc-preset-card').forEach(c => c.classList.remove('sel')); el.classList.add('sel'); }
    function dcTog(el) { el.closest('.dc-togrow')?.querySelectorAll('.dc-tg').forEach(t => t.classList.remove('on')); el.classList.add('on'); }

    dcRender();
  </script>

  <script src="main.js"></script>
  <script src="site-header.js"></script>
</body>
</html>
