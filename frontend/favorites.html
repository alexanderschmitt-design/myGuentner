<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites — myGüntner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header" data-app-header data-active="favorites"></header>

  <main class="page-content">
    <div class="container">

      <nav class="spd-breadcrumbs">
        <a href="overview.html">Homepage</a><span class="sep">/</span>
        <span class="current">Favorites</span>
      </nav>

      <div class="proj-detail-header">
        <div class="proj-detail-title-wrap">
          <h1 class="proj-detail-title">FAVORITES</h1>
        </div>
        <div class="proj-detail-toolbar">
          <button class="dg-tool-icon" type="button" aria-label="Cart"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></button>
          <button class="dg-tool-icon" type="button" aria-label="Remove all"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 012-2h2a2 2 0 012 2v2"/></svg></button>
          <span class="proj-detail-count">5 Items</span>
        </div>
      </div>

      <div class="dg-wrap" style="margin-bottom:32px">
        <table class="dg dg--compact" id="fav-grid">
          <thead>
            <tr>
              <th style="width:60px"></th>
              <th><div class="dg-th-inner"><span class="dg-th-label">Product</span><button type="button" class="dg-icon-btn dg-filter-btn" aria-label="Filter"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg></button></div></th>
              <th><div class="dg-th-inner"><span class="dg-th-label">Brand</span><button type="button" class="dg-icon-btn dg-filter-btn" aria-label="Filter"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg></button></div></th>
              <th><div class="dg-th-inner"><span class="dg-th-label">Type</span><button type="button" class="dg-icon-btn dg-menu-btn" aria-label="Column menu"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button></div></th>
              <th><div class="dg-th-inner"><span class="dg-th-label">Stock</span></div></th>
              <th><div class="dg-th-inner"><span class="dg-th-label">Price</span><button type="button" class="dg-icon-btn dg-menu-btn" aria-label="Column menu"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button></div></th>
              <th style="width:80px"></th>
            </tr>
          </thead>
          <tbody id="fav-tbody"></tbody>
        </table>
        <div class="dg-pagination">
          <span>Showing 1–5 of 5 items</span>
          <span style="display:inline-flex;gap:6px;align-items:center">
            <button class="dg-tool-icon" type="button" aria-label="Previous" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
            <span>Page 1 of 1</span>
            <button class="dg-tool-icon" type="button" aria-label="Next" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
          </span>
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <a href="admin.html" class="footer-logo">
          <svg class="footer-logo-bars" width="24" height="15" viewBox="0 0 32 20"><rect x="0" y="6" width="3" height="8" rx="1" fill="#39EDB5"/><rect x="5" y="2" width="3" height="16" rx="1" fill="#39EDB5"/><rect x="10" y="4" width="3" height="12" rx="1" fill="#2DC8A0"/><rect x="15" y="0" width="3" height="20" rx="1" fill="#2AAE8C"/><rect x="20" y="6" width="3" height="8" rx="1" fill="#2896E0"/><rect x="25" y="3" width="3" height="14" rx="1" fill="#2666E0"/></svg>
          <span class="footer-logo-text"><span class="logo-my">my</span><span class="logo-name">Güntner</span></span>
        </a>
      </div>
      <div class="footer-right">
        <a href="#">Privacy Policy</a>
        <a href="#">Legal Notice</a>
        <a href="#">Terms &amp; Conditions</a>
        <span class="footer-copyright">Copyright &copy; 2026 G&uuml;ntner GmbH &amp; Co. KG</span>
      </div>
    </div>
  </footer>

  <script>
    const FAVS = [
      { name: 'KIT VALVE 7 ACT B211-TFRX2', brand: 'GMA Pro 7000',     type: 'Spare Part', stock: 'In stock',   price: '769,00 €', img: 'https://images.unsplash.com/photo-1581094794329-c8112a89af12?w=200&h=200&fit=crop', href: 'sparepart-detail.html' },
      { name: 'EC FAN MOTOR 800Ø-DC48',     brand: 'HeatWave Max Plus',type: 'Spare Part', stock: '>10 in stock', price: '1.249,00 €', img: 'https://images.unsplash.com/photo-1581094488379-6b9d2b0e7c5b?w=200&h=200&fit=crop', href: 'sparepart-detail.html' },
      { name: 'GACC CX 040.2/2WN/DJA4A.UNNN', brand: 'Güntner',        type: 'Configured Unit', stock: 'Build to order', price: '— configurable —', img: 'https://images.unsplash.com/photo-1581092334651-ddf26d9a09d0?w=200&h=200&fit=crop', href: 'datasheet.html' },
      { name: 'CONTROLLER UNIT GHN-12 V2',  brand: 'FrostGuard 2000', type: 'Spare Part', stock: 'In stock', price: '2.150,00 €', img: 'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=200&h=200&fit=crop', href: 'sparepart-detail.html' },
      { name: 'DRAIN PAN HEATER 1.5 kW',    brand: 'PyroTech Prime 900', type: 'Spare Part', stock: 'In stock', price: '189,00 €', img: 'https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=200&h=200&fit=crop', href: 'sparepart-detail.html' }
    ];
    const STAR = '<svg width="18" height="18" viewBox="0 0 24 24" fill="#E89211" stroke="#E89211" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
    const CART = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>';

    const tbody = document.getElementById('fav-tbody');
    FAVS.forEach(f => {
      const tr = document.createElement('tr');
      tr.onclick = () => location.href = f.href;
      tr.innerHTML = `
        <td><div class="proj-row-image"><img src="${f.img}" alt=""></div></td>
        <td><div class="proj-row-headline">${f.name}</div></td>
        <td>${f.brand}</td>
        <td>${f.type}</td>
        <td><span class="proj-row-stock">${f.stock}</span></td>
        <td><div class="proj-row-price">${f.price}</div></td>
        <td onclick="event.stopPropagation()">
          <div style="display:flex;gap:6px">
            <button type="button" class="dg-icon-btn" aria-label="Remove from favourites" title="Remove from favourites">${STAR}</button>
            <button type="button" class="dg-icon-btn" aria-label="Add to cart" title="Add to cart">${CART}</button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
  </script>

  <script src="site-header.js"></script>
  <script src="dg.js"></script>
  <script src="main.js"></script>
</body>
</html>
