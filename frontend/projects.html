<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — myGüntner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header" data-app-header data-active="projects"></header>

  <main class="page-content">
    <div class="container">

      <div class="dg-page-header">
        <div>
          <h1>PROJECTS</h1>
          <p>Track orders, configure products, and check out documents per project.</p>
        </div>
        <div>
          <button class="btn btn-primary" type="button" style="padding:9px 16px;display:inline-flex;align-items:center;gap:8px">
            Create Project
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>

      <nav class="proj-tabs">
        <a href="#" class="active">All Projects</a>
        <a href="#">My Projects</a>
        <a href="#">Shared Projects</a>
      </nav>

      <div class="proj-grid" id="proj-grid"></div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <a href="admin.html" class="footer-logo">
          <svg class="footer-logo-bars" width="24" height="15" viewBox="0 0 32 20"><rect x="0" y="6" width="3" height="8" rx="1" fill="#39EDB5"/><rect x="5" y="2" width="3" height="16" rx="1" fill="#39EDB5"/><rect x="10" y="4" width="3" height="12" rx="1" fill="#2DC8A0"/><rect x="15" y="0" width="3" height="20" rx="1" fill="#2AAE8C"/><rect x="20" y="6" width="3" height="8" rx="1" fill="#2896E0"/><rect x="25" y="3" width="3" height="14" rx="1" fill="#2666E0"/></svg>
          <span class="footer-logo-text"><span class="logo-my">my</span><span class="logo-name">Güntner</span></span>
        </a>
      </div>
      <div class="footer-right">
        <a href="#">Privacy Policy</a>
        <a href="#">Legal Notice</a>
        <a href="#">Terms &amp; Conditions</a>
        <span class="footer-copyright">Copyright &copy; 2026 G&uuml;ntner GmbH &amp; Co. KG</span>
      </div>
    </div>
  </footer>

  <script>
    const PROJECTS = [
      { name: 'Alexa - Berlin, Alexanderplatz', count: 7 },
      { name: 'Skyscraper Transformation & Redesign', count: 7 },
      { name: 'Restaurant Chain Upgrades', count: 7 },
      { name: 'Skyscraper Transformation', count: 7 },
      { name: 'NYC Subway System', count: 7 },
      { name: 'Mall of Berlin', count: 7 },
      { name: 'Restaurant Chain Upgrades', count: 7 },
      { name: 'Citylabs Cooling Enhancement', count: 7 }
    ];
    const DOTS = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>';
    const grid = document.getElementById('proj-grid');
    PROJECTS.forEach((p, i) => {
      const card = document.createElement('a');
      card.className = 'proj-card';
      card.href = `project-detail.html?id=${i+1}`;
      card.style.textDecoration = 'none';
      card.innerHTML = `
        <div class="proj-card-top">
          <span class="proj-card-title">${p.name}</span>
          <button type="button" class="proj-card-menu" aria-label="Menu" onclick="event.preventDefault();event.stopPropagation()">${DOTS}</button>
        </div>
        <span class="proj-card-badge">${p.count} Products</span>
      `;
      grid.appendChild(card);
    });
  </script>

  <script src="site-header.js"></script>
  <script src="main.js"></script>
</body>
</html>
