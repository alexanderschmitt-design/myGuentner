<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myGPS — Service &amp; Pricing</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header" data-app-header data-active="mygpc"></header>

  <div class="step-wizard" data-mygps-stepwizard="service"></div>

  <main class="page-content">
    <div class="container">

      <div class="action-bar">
        <div class="action-bar-left">
          <a data-mygps-prev href="mygps-accessories.html" class="btn btn-outline">
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
          </a>
        </div>
        <div class="action-bar-right">
          <a data-mygps-next href="mygps-output.html" class="btn btn-primary">
            Next
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      </div>

      <div class="mygps-page-title" data-mygps-category-label></div>

      <form id="mygps-service-form">

        <div class="mygps-card">
          <h3 class="mygps-section-title">Quantity &amp; Model</h3>
          <div class="mygps-row">
            <label for="svc-qty">Quantity &amp; Model</label>
            <div class="mygps-control">
              <input type="number" id="svc-qty" value="1" min="1" style="max-width:90px">
              <select id="svc-model" style="flex:1">
                <option>GCHE 1212-10.2I/020PE</option>
                <option>GCHE 1212-10.2I/024PE</option>
              </select>
            </div>
          </div>
        </div>

        <div class="mygps-card">
          <h3 class="mygps-section-title">Service</h3>

          <div class="mygps-row">
            <label>Start-up Service</label>
            <div class="mygps-control mygps-checkbox-list">
              <label><input type="checkbox"> Quote remote start-up</label>
              <label><input type="checkbox"> Quote in-person start-up</label>
            </div>
          </div>

          <div class="mygps-row">
            <label for="svc-state">State</label>
            <div class="mygps-control">
              <select id="svc-state">
                <option value="">Please select a state</option>
                <option>California</option>
                <option>Texas</option>
                <option>New York</option>
                <option>Florida</option>
                <option>Bavaria (DE)</option>
                <option>North Rhine-Westphalia (DE)</option>
              </select>
            </div>
          </div>
        </div>

        <div class="mygps-card">
          <h3 class="mygps-section-title">Pricing</h3>

          <div class="mygps-row">
            <label for="discount">Product Discount %</label>
            <div class="mygps-control">
              <span style="color:var(--text-medium);font-size:13px">%</span>
              <input type="number" id="discount" value="0.0" step="0.1" style="max-width:120px">
              <span style="color:var(--text-light);font-size:12px;font-style:italic">Note: This is a discount, not a multiplier.</span>
            </div>
          </div>

          <div class="mygps-cta-row">
            <a data-mygps-next href="mygps-output.html" class="btn btn-primary">Rate Equipment</a>
          </div>
        </div>

      </form>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <a href="admin.html" class="footer-logo">
          <svg class="footer-logo-bars" width="24" height="15" viewBox="0 0 32 20"><rect x="0" y="6" width="3" height="8" rx="1" fill="#39EDB5"/><rect x="5" y="2" width="3" height="16" rx="1" fill="#39EDB5"/><rect x="10" y="4" width="3" height="12" rx="1" fill="#2DC8A0"/><rect x="15" y="0" width="3" height="20" rx="1" fill="#2AAE8C"/><rect x="20" y="6" width="3" height="8" rx="1" fill="#2896E0"/><rect x="25" y="3" width="3" height="14" rx="1" fill="#2666E0"/></svg>
          <span class="footer-logo-text"><span class="logo-my">my</span><span class="logo-name">Güntner</span></span>
        </a>
      </div>
      <div class="footer-right">
        <a href="#">Privacy Policy</a>
        <a href="#">Legal Notice</a>
        <a href="#">Terms &amp; Conditions</a>
        <span class="footer-copyright">Copyright &copy; 2026 G&uuml;ntner GmbH &amp; Co. KG</span>
      </div>
    </div>
  </footer>

  <script src="mygps-flows.js"></script>
  <script src="main.js"></script>
  <script src="mygps.js"></script>
  <script src="site-header.js"></script>
</body>
</html>
