<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myGPS — Annual Analysis</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header" data-app-header data-active="mygpc"></header>

  <div class="step-wizard" data-mygps-stepwizard="annual"></div>

  <main class="page-content">
    <div class="container">

      <div class="action-bar">
        <div class="action-bar-left">
          <a data-mygps-prev href="mygps-output.html" class="btn btn-outline">
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
          </a>
        </div>
        <div class="action-bar-right">
          <a data-mygps-next href="mygps-datasheet.html" class="btn btn-primary">
            Next
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>
      </div>

      <div class="mygps-page-title" data-mygps-category-label></div>

      <div class="mygps-toolbar">
        <select data-mygps-unit-toggle aria-label="Set all units of measure to">
          <option value="us">Set all units of measure to: US</option>
          <option value="si">Set all units of measure to: SI</option>
        </select>
        <select aria-label="Set currency to">
          <option>Set currency to: USD</option>
          <option>Set currency to: EUR</option>
          <option>Set currency to: GBP</option>
        </select>
      </div>

      <form id="mygps-annual-form">

        <div class="mygps-card">
          <h3 class="mygps-section-title">Annual Analysis Setup</h3>

          <div class="mygps-row">
            <label for="ann-units">Number of Units</label>
            <div class="mygps-control">
              <input type="number" id="ann-units" value="1" min="1" style="max-width:100px">
              <select style="flex:1">
                <option>GCHE 1212-10.2I/024PE</option>
                <option>GCHE 1212-10.2I/020PE</option>
                <option>GCHE 1818-10.2I/030PE</option>
              </select>
            </div>
          </div>

          <div class="mygps-row">
            <label for="ann-location">Location</label>
            <div class="mygps-control">
              <input type="text" id="ann-location" placeholder="e.g. Chicago, IL">
              <button type="button" class="btn btn-outline" style="padding:7px 14px">Find Location</button>
            </div>
          </div>

          <div class="mygps-row">
            <label for="ann-ashrae">ASHRAE Location</label>
            <div class="mygps-control">
              <input type="text" id="ann-ashrae" placeholder="ASHRAE weather station">
            </div>
          </div>

          <div class="mygps-row">
            <label for="ann-water">Water Price</label>
            <div class="mygps-control">
              <input type="number" id="ann-water" value="10.00" step="0.01">
              <select class="mygps-unit" data-unit-options="water_rate"></select>
            </div>
          </div>

          <div class="mygps-row">
            <label for="ann-energy">Energy Price</label>
            <div class="mygps-control">
              <input type="number" id="ann-energy" value="0.10" step="0.01">
              <select class="mygps-unit" data-unit-options="energy_rate"></select>
            </div>
          </div>

          <div class="mygps-row">
            <label for="ann-cycles">Cycles of Concentration</label>
            <div class="mygps-control">
              <input type="number" id="ann-cycles" value="4" min="1" style="max-width:120px">
            </div>
          </div>

          <div class="mygps-row">
            <label for="ann-load">Load Profile</label>
            <div class="mygps-control">
              <select id="ann-load" style="max-width:200px">
                <option>Constant</option>
                <option>Variable</option>
                <option>Defined Hourly</option>
              </select>
              <button type="button" class="btn btn-outline" style="padding:7px 14px">Define Load</button>
              <span title="Load profile help" style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;border:1px solid var(--border-dark);color:var(--text-medium);font-size:12px;cursor:help">?</span>
            </div>
          </div>

          <div class="mygps-row">
            <label for="ann-cap">Capacity</label>
            <div class="mygps-control">
              <input type="number" id="ann-cap" value="5000">
              <select class="mygps-unit" data-unit-options="capacity"></select>
            </div>
          </div>

          <div class="mygps-row">
            <label for="ann-refrigerant">Refrigerant</label>
            <div class="mygps-control">
              <select id="ann-refrigerant">
                <option>R-717 Ammonia</option>
                <option>R-744 CO2</option>
                <option>R-448A</option>
                <option>R-449A</option>
              </select>
            </div>
          </div>

          <div class="mygps-row">
            <label for="ann-mincond">Minimum Condensing Temperature</label>
            <div class="mygps-control">
              <input type="number" id="ann-mincond" value="70">
              <select class="mygps-unit" data-unit-options="temperature"></select>
            </div>
          </div>

          <div class="mygps-cta-row">
            <button type="button" class="btn btn-primary">Run Annual Analysis</button>
          </div>
        </div>

      </form>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <a href="admin.html" class="footer-logo">
          <svg class="footer-logo-bars" width="24" height="15" viewBox="0 0 32 20"><rect x="0" y="6" width="3" height="8" rx="1" fill="#39EDB5"/><rect x="5" y="2" width="3" height="16" rx="1" fill="#39EDB5"/><rect x="10" y="4" width="3" height="12" rx="1" fill="#2DC8A0"/><rect x="15" y="0" width="3" height="20" rx="1" fill="#2AAE8C"/><rect x="20" y="6" width="3" height="8" rx="1" fill="#2896E0"/><rect x="25" y="3" width="3" height="14" rx="1" fill="#2666E0"/></svg>
          <span class="footer-logo-text"><span class="logo-my">my</span><span class="logo-name">Güntner</span></span>
        </a>
      </div>
      <div class="footer-right">
        <a href="#">Privacy Policy</a>
        <a href="#">Legal Notice</a>
        <a href="#">Terms &amp; Conditions</a>
        <span class="footer-copyright">Copyright &copy; 2026 G&uuml;ntner GmbH &amp; Co. KG</span>
      </div>
    </div>
  </footer>

  <script src="mygps-flows.js"></script>
  <script src="main.js"></script>
  <script src="mygps.js"></script>
  <script src="site-header.js"></script>
</body>
</html>
