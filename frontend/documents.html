<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documents — myGüntner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header" data-app-header data-active="documents"></header>

  <main class="page-content">
    <div class="container">

      <div class="dg-page-header">
        <div>
          <h1>Documents</h1>
          <p>Get access to product brochures, technical sheets, and many more.</p>
        </div>
      </div>

      <!-- ===== Active filter chips ===== -->
      <div class="docs-chip-bar" id="docs-chips"></div>

      <!-- ===== Toolbar: search + view toggle + pager ===== -->
      <div id="docs-listing" class="dg-view-list">
        <div class="docs-toolbar">
          <div class="docs-toolbar-left">
            <div class="dg-search">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" placeholder="Search by term">
            </div>
            <button class="dg-tool-icon" type="button" aria-label="Filter">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            </button>
            <button class="dg-tool-icon" type="button" aria-label="Layout options">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            </button>
          </div>
          <div class="docs-toolbar-right">
            <div class="dg-view-toggle" data-target="#docs-listing">
              <button type="button" data-view="list" class="active" aria-label="List view">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                List
              </button>
              <button type="button" data-view="grid" aria-label="Grid view">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Grid
              </button>
            </div>
            <div class="docs-pager">
              <button class="dg-tool-icon" type="button" aria-label="Previous"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
              <span><span class="docs-pager-num">1</span> / 13</span>
              <button class="dg-tool-icon" type="button" aria-label="Next"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
            </div>
          </div>
        </div>

        <!-- ===== TABLE VIEW ===== -->
        <div class="dg-table-view">
          <div class="dg-wrap">
            <table class="dg dg--docs dg--auto-headers" id="docs-grid">
              <thead>
                <tr>
                  <th style="width:34%">File</th>
                  <th>Product Category</th>
                  <th>Product Group</th>
                  <th>Product Series</th>
                  <th>Type</th>
                  <th>Language</th>
                  <th>ERP Code</th>
                </tr>
              </thead>
              <tbody id="docs-tbody"></tbody>
            </table>
            <div class="dg-pagination">
              <span id="docs-pageinfo">Showing 1–12 of 12 documents</span>
              <span style="display:inline-flex;gap:6px;align-items:center">
                <button class="dg-tool-icon" type="button" id="docs-prev" aria-label="Previous"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
                <span>Page 1 of 1</span>
                <button class="dg-tool-icon" type="button" id="docs-next" aria-label="Next"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
              </span>
            </div>
          </div>
        </div>

        <!-- ===== GRID VIEW (cards) ===== -->
        <div class="dg-card-view">
          <div class="docs-card-grid" id="docs-card-grid"></div>
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <a href="admin.html" class="footer-logo">
          <svg class="footer-logo-bars" width="24" height="15" viewBox="0 0 32 20"><rect x="0" y="6" width="3" height="8" rx="1" fill="#39EDB5"/><rect x="5" y="2" width="3" height="16" rx="1" fill="#39EDB5"/><rect x="10" y="4" width="3" height="12" rx="1" fill="#2DC8A0"/><rect x="15" y="0" width="3" height="20" rx="1" fill="#2AAE8C"/><rect x="20" y="6" width="3" height="8" rx="1" fill="#2896E0"/><rect x="25" y="3" width="3" height="14" rx="1" fill="#2666E0"/></svg>
          <span class="footer-logo-text"><span class="logo-my">my</span><span class="logo-name">Güntner</span></span>
        </a>
      </div>
      <div class="footer-right">
        <a href="#">Privacy Policy</a>
        <a href="#">Legal Notice</a>
        <a href="#">Terms &amp; Conditions</a>
        <span class="footer-copyright">Copyright &copy; 2026 G&uuml;ntner GmbH &amp; Co. KG</span>
      </div>
    </div>
  </footer>

  <script>
    // ===== Sample document rows
    const DOC_ROWS = [
      ['erp-code---vt01223.PDF',                'Adiabatic Condenser',   'APPLICATION PENTHOUSE', '',     'Reference',           'Bulgarian', '-'],
      ['ERPcode-XXXXX2200175023T.PDF',          'Waste Heat Unit',       'RECEIVER',              '',     'Flyer',               'Croatian',  '-'],
      ['DuplicateFileName.PDF',                 'Adiabatic Condenser',   'APPLICATION AGRI',      'GACA', 'Application Brochure','Spanish',   '-'],
      ['test-POST-MPD-12526-postman.V5.xml',    'Adiabatic Condenser',   '-',                     '',     'Application Brochure','Norwegian', '-'],
      ['GUE_ECOSS_Booklet_US_EN_RGB_DIGITAL.PDF','Evaporative Condenser','APPLICATION ECOSS',     'ECOSS','Brochure',            'English',   '-'],
      ['Guentner_Manual_AGFN_EN.PDF',           'Air Cooler',            'VARIO CUBIC',           'GFN',  'Manual',              'English',   'AGFN-022-EN'],
      ['Guentner_Manual_AGHN_DE.PDF',           'Air Cooler',            'VARIO CUBIC',           'GHN',  'Manual',              'German',    'AGHN-014-DE'],
      ['GUE_GACA_RX_Datasheet_FR.PDF',          'Adiabatic Condenser',   'APPLICATION AGRI',      'GACA', 'Datasheet',           'French',    'GACA-RX-FR'],
      ['GUE_GACA_FP_Datasheet_DE.PDF',          'Adiabatic Condenser',   'APPLICATION AGRI',      'GACA', 'Datasheet',           'German',    'GACA-FP-DE'],
      ['GUE_GACC_Brochure_EN.PDF',              'Air Cooler',            'AIR COOLER',            '',     'Brochure',            'English',   'GACC-001'],
      ['Guentner_Flyer_HydroBLU_IT.PDF',        'Adiabatic Condenser',   'APPLICATION PENTHOUSE', '',     'Flyer',               'Italian',   '-'],
      ['Guentner_Manual_GFH_EN.PDF',            'Dry Cooler',            'PROCESS',               'GFH',  'Manual',              'English',   'GFH-EN-002']
    ];

    // Render table rows
    const tbody = document.getElementById('docs-tbody');
    DOC_ROWS.forEach((row) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><a href="#">${row[0]}</a></td>
        <td>${row[1]}</td>
        <td>${row[2]}</td>
        <td>${row[3]}</td>
        <td>${row[4]}</td>
        <td>${row[5]}</td>
        <td>${row[6]}</td>
      `;
      tbody.appendChild(tr);
    });

    // ===== Active filter chips
    const ACTIVE_FILTERS = [
      { key: 'brand',          label: 'Brand',           value: 'Güntner' },
      { key: 'region',         label: 'Region',          value: 'Europe' },
      { key: 'language',       label: 'Language',        value: 'Italian' },
      { key: 'product_series', label: 'Product Series',  value: 'GHN' },
      { key: 'product_family', label: 'Product Family',  value: 'VARIO' },
      { key: 'type',           label: 'Type',            value: 'Manual' },
      { key: 'permission',     label: 'Permission',      value: '' }
    ];
    const chipBar = document.getElementById('docs-chips');
    function renderChips() {
      chipBar.innerHTML = '';
      ACTIVE_FILTERS.forEach((f, idx) => {
        const chip = document.createElement('span');
        chip.className = 'docs-chip' + (f.value ? '' : ' is-empty');
        chip.innerHTML = `
          <span class="docs-chip-label">${f.label}${f.value ? ':' : ''}</span>
          ${f.value ? `<span class="docs-chip-value">${f.value}</span>` : ''}
          <button type="button" class="docs-chip-x" aria-label="Remove filter" data-idx="${idx}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        `;
        chipBar.appendChild(chip);
      });
      chipBar.querySelectorAll('.docs-chip-x').forEach(b => {
        b.addEventListener('click', e => {
          e.stopPropagation();
          const idx = Number(b.dataset.idx);
          ACTIVE_FILTERS[idx].value = '';
          renderChips();
        });
      });
    }
    renderChips();

    // ===== Rich grid (cards) view
    const MENU_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>';
    const cardGrid = document.getElementById('docs-card-grid');
    DOC_ROWS.forEach((row) => {
      const ext = (row[0].split('.').pop() || 'PDF').toUpperCase();
      const card = document.createElement('a');
      card.className = 'docs-card';
      card.href = '#';
      card.style.textDecoration = 'none';
      card.innerHTML = `
        <div class="docs-card-top">
          <span class="docs-card-fileicon">${ext}</span>
          <button type="button" class="docs-card-menu" aria-label="More actions" onclick="event.preventDefault();event.stopPropagation()">${MENU_ICON}</button>
        </div>
        <span class="docs-card-name">${row[0]}</span>
        <dl class="docs-card-meta">
          <dt>Region:</dt>          <dd>Europe</dd>
          <dt>Language:</dt>        <dd>${row[5]}</dd>
          <dt>Product Family:</dt>  <dd>${row[2] && row[2] !== '-' ? row[2] : '—'}</dd>
          <dt>Product Series:</dt>  <dd>${row[3] || '—'}</dd>
          <dt>Type:</dt>            <dd>${row[4]}</dd>
          <dt>Permission:</dt>      <dd>Public</dd>
        </dl>
      `;
      cardGrid.appendChild(card);
    });

    document.getElementById('docs-pageinfo').textContent =
      `Showing 1–${DOC_ROWS.length} of ${DOC_ROWS.length} documents`;
  </script>

  <script src="site-header.js"></script>
  <script src="dg.js"></script>
  <script src="main.js"></script>
</body>
</html>
