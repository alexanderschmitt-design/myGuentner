<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>myGPC Foundation Smoketest</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #f5f5f5; }
    h1 { color: #003865; }
    .ok   { color: #006633; }
    .fail { color: #cc0000; font-weight: bold; }
    .info { color: #666; }
    pre { background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 4px; }
    button { padding: 8px 16px; margin-right: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>myGPC Foundation Smoketest — Stage A</h1>
  <p class="info">Testet mygpc-state, mygpc-api, mygpc-class-config, mygpc-bind im Browser.</p>

  <div>
    <button onclick="runTests()">Run all tests</button>
    <button onclick="MyGPC.state.reset(); log('state.reset() done', 'ok');">Reset state</button>
    <button onclick="showState()">Show state</button>
  </div>

  <h2>Output</h2>
  <pre id="output"></pre>

  <script src="mygpc-state.js"></script>
  <script src="mygpc-api.js"></script>
  <script src="mygpc-class-config.js"></script>
  <script src="mygpc-bind.js"></script>

  <script>
    var output = document.getElementById('output');
    function log(msg, level) {
      var line = '[' + (level || 'info').toUpperCase() + '] ' + msg;
      var span = document.createElement('span');
      span.className = level || 'info';
      span.textContent = line + '\n';
      output.appendChild(span);
      console.log(line);
    }

    function showState() {
      log('--- snapshot ---', 'info');
      log(JSON.stringify(MyGPC.state.snapshot(), null, 2), 'info');
    }

    async function runTests() {
      output.innerHTML = '';
      log('Foundation Smoketest gestartet', 'info');

      // === Module-Existenz ===
      ['state', 'api', 'classConfig', 'bind'].forEach(function (mod) {
        if (window.MyGPC && window.MyGPC[mod]) log('MyGPC.' + mod + ' geladen', 'ok');
        else log('MyGPC.' + mod + ' FEHLT', 'fail');
      });

      // === classConfig ===
      log('--- classConfig ---', 'info');
      var classMap = { 0: 'A', 1: 'B', 2: 'C', 3: 'D1', 4: 'E1', 5: 'D2', 6: 'E2', 10: 'F' };
      Object.keys(classMap).forEach(function (cat) {
        var expected = classMap[cat];
        var actual = MyGPC.classConfig.classOf(1, Number(cat));
        if (actual === expected) log('classOf(1, ' + cat + ') = ' + actual + ' ✓', 'ok');
        else log('classOf(1, ' + cat + ') = ' + actual + ', erwartet ' + expected, 'fail');
      });
      if (MyGPC.classConfig.classOf(2, 0) === null) log('classOf(2, 0) = null (Bare coil) ✓', 'ok');
      else log('classOf(2, 0) sollte null sein für Bare coil', 'fail');

      // === Converters ===
      log('--- converters ---', 'info');
      var tests = [
        ['W-kW',       10000, 10,    'toUI'],
        ['W-kW',       10,    10000, 'toAPI'],
        ['mbar-bar',   1000,  1,     'toUI'],
        ['bool-int',   1,     true,  'toUI'],
        ['bool-int',   true,  1,     'toAPI'],
        ['bool-invert', true, false, 'toUI']
      ];
      tests.forEach(function (t) {
        var fn = t[3] === 'toUI' ? MyGPC.classConfig.applyToUI : MyGPC.classConfig.applyToAPI;
        var got = fn(t[0], t[1]);
        var exp = t[2];
        if (got === exp) log(t[0] + '.' + t[3] + '(' + t[1] + ') = ' + got + ' ✓', 'ok');
        else log(t[0] + '.' + t[3] + '(' + t[1] + ') = ' + got + ', erwartet ' + exp, 'fail');
      });

      // === matchesClass ===
      log('--- matchesClass ---', 'info');
      var mc = MyGPC.classConfig.matchesClass;
      if (mc('A', 'A,B', null) === true) log("matchesClass('A','A,B') = true ✓", 'ok');
      else log('matchesClass false should be true', 'fail');
      if (mc('F', 'A,B', null) === false) log("matchesClass('F','A,B') = false ✓", 'ok');
      else log('matchesClass should be false', 'fail');
      if (mc('A', null, null) === true) log('matchesClass with null = true ✓', 'ok');
      else log('matchesClass null should be true', 'fail');
      if (mc('F', null, 'F') === false) log('matchesClass not-list F = false ✓', 'ok');
      else log('matchesClass not-list F should be false', 'fail');

      // === State ===
      log('--- state ---', 'info');
      MyGPC.state.setCategory(1, 3, 'Condenser');
      var s = MyGPC.state.snapshot();
      if (s.productCategory === 3) log('setCategory → productCategory=3 ✓', 'ok');
      else log('setCategory failed: ' + JSON.stringify(s), 'fail');
      if (s.architectureClass === 'D1') log('architectureClass auto-derived = D1 ✓', 'ok');
      else log('architectureClass = ' + s.architectureClass + ', erwartet D1', 'fail');

      MyGPC.state.patchUid({ thermalCapacity: 50000 });
      if (MyGPC.state.get('unitInputData').thermalCapacity === 50000) log('patchUid ✓', 'ok');
      else log('patchUid failed', 'fail');

      // === API Smoke ===
      log('--- api (Live-Calls) ---', 'info');
      try {
        var h = await MyGPC.api.health();
        if (h && h.ok) log('api.health() → ok, gpcVersion=' + h.gpcVersion, 'ok');
        else log('api.health() unerwartet: ' + JSON.stringify(h), 'fail');
      } catch (e) {
        log('api.health() Fehler: ' + e.message, 'fail');
      }

      try {
        var cats = await MyGPC.api.productCategories();
        if (Array.isArray(cats) && cats.length === 15) log('api.productCategories() → ' + cats.length + ' Einträge ✓', 'ok');
        else log('productCategories: erwartete 15, got ' + (Array.isArray(cats) ? cats.length : '?'), 'fail');
      } catch (e) {
        log('api.productCategories() Fehler: ' + e.message, 'fail');
      }

      try {
        var def = await MyGPC.api.defaultInputData(0);
        if (def && def.success && def.content && def.content.thermalCapacity === 10000) {
          log('api.defaultInputData(0) → thermalCapacity=10000 ✓', 'ok');
        } else log('defaultInputData(0) unerwartet', 'fail');
      } catch (e) {
        log('api.defaultInputData(0) Fehler: ' + e.message, 'fail');
      }

      try {
        var fl = await MyGPC.api.fluids(0);
        if (fl && fl.content && fl.content.length === 42) log('api.fluids(0) → 42 Fluids ✓', 'ok');
        else log('fluids(0) erwartete 42, got ' + (fl && fl.content && fl.content.length), 'fail');
      } catch (e) {
        log('api.fluids(0) Fehler: ' + e.message, 'fail');
      }

      log('--- fertig ---', 'info');
      log('State nach Tests:', 'info');
      log(JSON.stringify(MyGPC.state.snapshot(), null, 2), 'info');
    }

    log('Smoketest-Page geladen. Klick "Run all tests".', 'info');
  </script>
</body>
</html>
