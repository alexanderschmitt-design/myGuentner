          <button class="dg-tool-icon" type="button" aria-label="Download"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
          <button class="dg-tool-icon" type="button" aria-label="Cart"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></button>
          <button class="dg-tool-icon" type="button" aria-label="Delete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 01-2 2H9a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 012-2h2a2 2 0 012 2v2"/></svg></button>

      <div class="dg-wrap" style="margin-bottom:32px">

              <th style="width:280px"><div class="dg-th-inner"><span class="dg-th-label">Product</span><button type="button" class="dg-icon-btn dg-filter-btn" aria-label="Filter"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg></button><button type="button" class="dg-icon-btn dg-menu-btn" aria-label="Column menu"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button></div></th>
              <th><div class="dg-th-inner"><span class="dg-th-label">Variant</span><button type="button" class="dg-icon-btn dg-filter-btn" aria-label="Filter"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg></button></div></th>
              <th><div class="dg-th-inner"><span class="dg-th-label">Specs</span><button type="button" class="dg-icon-btn dg-menu-btn" aria-label="Column menu"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button></div></th>
              <th><div class="dg-th-inner"><span class="dg-th-label">Dimensions</span></div></th>
              <th><div class="dg-th-inner"><span class="dg-th-label">Availability</span></div></th>
              <th><div class="dg-th-inner"><span class="dg-th-label">Price</span><button type="button" class="dg-icon-btn dg-menu-btn" aria-label="Column menu"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button></div></th>
            </tr>
          </thead>
          <tbody id="proj-tbody"></tbody>
        </table>
        <div class="dg-pagination">
          <span>Showing 1–7 of 7 products</span>
          <span style="display:inline-flex;gap:6px;align-items:center">
            <button class="dg-tool-icon" type="button" aria-label="Previous" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
            <span>Page 1 of 1</span>
            <button class="dg-tool-icon" type="button" aria-label="Next" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
          </span>
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <a href="admin.html" class="footer-logo">
          <svg class="footer-logo-bars" width="24" height="15" viewBox="0 0 32 20"><rect x="0" y="6" width="3" height="8" rx="1" fill="#39EDB5"/><rect x="5" y="2" width="3" height="16" rx="1" fill="#39EDB5"/><rect x="10" y="4" width="3" height="12" rx="1" fill="#2DC8A0"/><rect x="15" y="0" width="3" height="20" rx="1" fill="#2AAE8C"/><rect x="20" y="6" width="3" height="8" rx="1" fill="#2896E0"/><rect x="25" y="3" width="3" height="14" rx="1" fill="#2666E0"/></svg>
          <span class="footer-logo-text"><span class="logo-my">my</span><span class="logo-name">Güntner</span></span>
        </a>
      </div>
      <div class="footer-right">
        <a href="#">Privacy Policy</a>
        <a href="#">Legal Notice</a>
        <a href="#">Terms &amp; Conditions</a>
        <span class="footer-copyright">Copyright &copy; 2026 G&uuml;ntner GmbH &amp; Co. KG</span>
      </div>
    </div>
  </footer>

  <script>
    const ROWS = [
      { variant: 'VaporMax Pro 7000' },
      { variant: 'ThermoBlast 300' },
      { variant: 'CryoCore X500' },
      { variant: 'HeatWave Max Plus' },
      { variant: 'FrostGuard 2000' },
      { variant: 'PyroTech Prime 900' },
      { variant: 'GlacierChill 100' }
    ];
    const IMG = 'https://images.unsplash.com/photo-1581094794329-c8112a89af12?w=200&h=200&fit=crop';
    const tbody = document.getElementById('proj-tbody');

    ROWS.forEach((r, i) => {
      const tr = document.createElement('tr');
      if (i === 3) tr.classList.add('is-selected');
      tr.innerHTML = `
        <td>
          <div style="display:flex;gap:12px;align-items:center">
            <div class="proj-row-image"><img src="${IMG}" alt=""></div>
            <div>
              <div class="proj-row-headline">Heating Element Tray</div>
              <div class="proj-row-id">H81AA070006G0230</div>
              <div class="proj-row-successor">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                This item is the successor for <a href="#" style="color:var(--primary)">VT01101</a>
              </div>
            </div>
          </div>
        </td>
        <td>
          <div>
            <div class="proj-row-headline" style="color:var(--primary)">${r.variant}</div>
            <div class="proj-row-actions">
              <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> Information</a>
              <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Additional Products</a>
            </div>
            <div class="proj-row-actions" style="margin-top:2px">
              <a href="#">Notes</a>
              <a href="#">Sketch</a>
              <a href="#">Accessories</a>
            </div>
          </div>
        </td>
        <td>
          <dl class="dg-spec-list">
            <dt>Capacity</dt><dd>600 W</dd>
            <dt>Voltage</dt><dd>230 V</dd>
            <dt>Imp</dt><dd>8 Ohm</dd>
            <dt>Weight</dt><dd>12 kg</dd>
          </dl>
        </td>
        <td>
          <dl class="dg-spec-list">
            <dt>Length</dt><dd>700 mm</dd>
            <dt>Width</dt><dd>50 mm</dd>
          </dl>
        </td>
        <td>
          <div class="proj-row-stock">>10 in stock</div>
          <div class="proj-row-delivery">Delivery within 4 weeks</div>
        </td>
        <td>
          <div class="proj-row-price-was">845,00 € <span class="disc">-10%</span></div>
          <div class="proj-row-price">769,00 €</div>
          ${i === 3 ? `
          <div class="proj-row-qty" style="margin-top:6px">
            <button type="button" aria-label="Decrease">−</button>
            <input type="text" value="1">
            <button type="button" aria-label="Increase">+</button>
          </div>` : ''}
        </td>
      `;
      tbody.appendChild(tr);
    });
  </script>

  <script src="site-header.js"></script>
  <script src="dg.js"></script>
  <script src="main.js"></script>

</html>
