<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" fill="none">
  <!-- Background -->
  <rect width="360" height="220" rx="4" fill="#F8F9FA"/>
  <!-- Main evaporator body - front view -->
  <rect x="40" y="40" width="280" height="120" rx="3" stroke="#999" stroke-width="1.5" fill="none"/>
  <!-- Inner coil area -->
  <rect x="50" y="50" width="160" height="100" stroke="#bbb" stroke-width="1" fill="#f0f0f0" stroke-dasharray="4 2"/>
  <!-- Fin lines -->
  <g stroke="#ccc" stroke-width=".6">
    <line x1="60" y1="55" x2="60" y2="145"/><line x1="68" y1="55" x2="68" y2="145"/>
    <line x1="76" y1="55" x2="76" y2="145"/><line x1="84" y1="55" x2="84" y2="145"/>
    <line x1="92" y1="55" x2="92" y2="145"/><line x1="100" y1="55" x2="100" y2="145"/>
    <line x1="108" y1="55" x2="108" y2="145"/><line x1="116" y1="55" x2="116" y2="145"/>
    <line x1="124" y1="55" x2="124" y2="145"/><line x1="132" y1="55" x2="132" y2="145"/>
    <line x1="140" y1="55" x2="140" y2="145"/><line x1="148" y1="55" x2="148" y2="145"/>
    <line x1="156" y1="55" x2="156" y2="145"/><line x1="164" y1="55" x2="164" y2="145"/>
    <line x1="172" y1="55" x2="172" y2="145"/><line x1="180" y1="55" x2="180" y2="145"/>
    <line x1="188" y1="55" x2="188" y2="145"/><line x1="196" y1="55" x2="196" y2="145"/>
    <line x1="204" y1="55" x2="204" y2="145"/>
  </g>
  <!-- Fan circles -->
  <circle cx="260" cy="75" r="22" stroke="#666" stroke-width="1.5" fill="#fafafa"/>
  <circle cx="260" cy="75" r="4" fill="#999"/>
  <circle cx="260" cy="135" r="22" stroke="#666" stroke-width="1.5" fill="#fafafa"/>
  <circle cx="260" cy="135" r="4" fill="#999"/>
  <!-- Fan blades -->
  <g stroke="#888" stroke-width="1">
    <line x1="260" y1="53" x2="260" y2="65"/><line x1="260" y1="85" x2="260" y2="97"/>
    <line x1="238" y1="75" x2="250" y2="75"/><line x1="270" y1="75" x2="282" y2="75"/>
    <line x1="260" y1="113" x2="260" y2="125"/><line x1="260" y1="145" x2="260" y2="157"/>
    <line x1="238" y1="135" x2="250" y2="135"/><line x1="270" y1="135" x2="282" y2="135"/>
  </g>
  <!-- Connection pipes -->
  <rect x="20" y="72" width="20" height="8" rx="3" stroke="#666" stroke-width="1.2" fill="#e8e8e8"/>
  <rect x="20" y="122" width="20" height="8" rx="3" stroke="#666" stroke-width="1.2" fill="#e8e8e8"/>
  <!-- Mounting brackets -->
  <path d="M80 160 L80 180 L90 180" stroke="#999" stroke-width="1.5" fill="none"/>
  <path d="M240 160 L240 180 L250 180" stroke="#999" stroke-width="1.5" fill="none"/>
  <!-- Dimension lines -->
  <g stroke="#2962FF" stroke-width=".8" fill="#2962FF" font-size="9" font-family="Barlow,sans-serif">
    <!-- Width -->
    <line x1="40" y1="195" x2="320" y2="195"/>
    <line x1="40" y1="190" x2="40" y2="200"/>
    <line x1="320" y1="190" x2="320" y2="200"/>
    <text x="180" y="208" text-anchor="middle" font-size="9">4088 mm</text>
    <!-- Height -->
    <line x1="340" y1="40" x2="340" y2="160"/>
    <line x1="335" y1="40" x2="345" y2="40"/>
    <line x1="335" y1="160" x2="345" y2="160"/>
    <text x="345" y="104" font-size="9" transform="rotate(90 345 104)" text-anchor="middle">1303 mm</text>
  </g>
  <!-- Labels -->
  <text x="130" y="105" text-anchor="middle" fill="#999" font-size="10" font-family="Barlow,sans-serif">Coil Section</text>
  <text x="260" y="108" text-anchor="middle" fill="#999" font-size="9" font-family="Barlow,sans-serif">Fans</text>
</svg>
