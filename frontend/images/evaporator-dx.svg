<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="400" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D2B45"/>
      <stop offset="100%" stop-color="#1A4A6E"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg1)"/>
  <!-- Grid pattern -->
  <g stroke="#fff" stroke-opacity=".04" stroke-width="1">
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="240"/><line x1="160" y1="0" x2="160" y2="240"/>
    <line x1="240" y1="0" x2="240" y2="240"/><line x1="320" y1="0" x2="320" y2="240"/>
  </g>
  <!-- Evaporator unit body -->
  <rect x="60" y="70" width="280" height="120" rx="4" fill="#1565C0" fill-opacity=".4" stroke="#64B5F6" stroke-width="1.5"/>
  <!-- Fin rows -->
  <g stroke="#90CAF9" stroke-width=".8" stroke-opacity=".5">
    <line x1="80" y1="80" x2="80" y2="180"/><line x1="90" y1="80" x2="90" y2="180"/>
    <line x1="100" y1="80" x2="100" y2="180"/><line x1="110" y1="80" x2="110" y2="180"/>
    <line x1="120" y1="80" x2="120" y2="180"/><line x1="130" y1="80" x2="130" y2="180"/>
    <line x1="140" y1="80" x2="140" y2="180"/><line x1="150" y1="80" x2="150" y2="180"/>
    <line x1="160" y1="80" x2="160" y2="180"/><line x1="170" y1="80" x2="170" y2="180"/>
    <line x1="180" y1="80" x2="180" y2="180"/><line x1="190" y1="80" x2="190" y2="180"/>
  </g>
  <!-- Fan circles -->
  <circle cx="260" cy="110" r="22" stroke="#E3F2FD" stroke-width="1.5" fill="#1E88E5" fill-opacity=".3"/>
  <circle cx="260" cy="110" r="10" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <circle cx="310" cy="160" r="22" stroke="#E3F2FD" stroke-width="1.5" fill="#1E88E5" fill-opacity=".3"/>
  <circle cx="310" cy="160" r="10" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <!-- Fan blades -->
  <g stroke="#E3F2FD" stroke-width="1.2">
    <line x1="260" y1="88" x2="260" y2="100"/><line x1="260" y1="120" x2="260" y2="132"/>
    <line x1="238" y1="110" x2="250" y2="110"/><line x1="270" y1="110" x2="282" y2="110"/>
    <line x1="310" y1="138" x2="310" y2="150"/><line x1="310" y1="170" x2="310" y2="182"/>
    <line x1="288" y1="160" x2="300" y2="160"/><line x1="320" y1="160" x2="332" y2="160"/>
  </g>
  <!-- Pipes -->
  <rect x="40" y="105" width="20" height="10" rx="2" fill="#42A5F5" fill-opacity=".5"/>
  <rect x="40" y="145" width="20" height="10" rx="2" fill="#42A5F5" fill-opacity=".5"/>
  <!-- Mounting brackets -->
  <rect x="100" y="190" width="8" height="30" rx="1" fill="#90CAF9" fill-opacity=".3"/>
  <rect x="290" y="190" width="8" height="30" rx="1" fill="#90CAF9" fill-opacity=".3"/>
  <!-- Light highlight -->
  <ellipse cx="200" cy="60" rx="120" ry="40" fill="#fff" fill-opacity=".03"/>
</svg>
