<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="400" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A3348"/>
      <stop offset="100%" stop-color="#2A5A7A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg6)"/>
  <g stroke="#fff" stroke-opacity=".04" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="180" x2="400" y2="180"/>
  </g>
  <!-- Compact housing -->
  <rect x="80" y="50" width="240" height="130" rx="6" fill="#1565C0" fill-opacity=".3" stroke="#64B5F6" stroke-width="1.5"/>
  <!-- CO2 label -->
  <text x="200" y="80" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="16" font-weight="600" fill="#64B5F6" fill-opacity=".5" letter-spacing="3">CO₂</text>
  <!-- Microchannel coils -->
  <g stroke="#90CAF9" stroke-opacity=".3" stroke-width=".8">
    <line x1="100" y1="90" x2="300" y2="90"/><line x1="100" y1="96" x2="300" y2="96"/>
    <line x1="100" y1="102" x2="300" y2="102"/><line x1="100" y1="108" x2="300" y2="108"/>
    <line x1="100" y1="114" x2="300" y2="114"/><line x1="100" y1="120" x2="300" y2="120"/>
    <line x1="100" y1="126" x2="300" y2="126"/><line x1="100" y1="132" x2="300" y2="132"/>
    <line x1="100" y1="138" x2="300" y2="138"/><line x1="100" y1="144" x2="300" y2="144"/>
    <line x1="100" y1="150" x2="300" y2="150"/><line x1="100" y1="156" x2="300" y2="156"/>
    <line x1="100" y1="162" x2="300" y2="162"/>
  </g>
  <!-- Vertical headers -->
  <rect x="95" y="85" width="6" height="85" rx="2" fill="#42A5F5" fill-opacity=".4"/>
  <rect x="299" y="85" width="6" height="85" rx="2" fill="#42A5F5" fill-opacity=".4"/>
  <!-- Top fans -->
  <circle cx="160" cy="42" r="18" stroke="#E3F2FD" stroke-width="1.5" fill="#1E88E5" fill-opacity=".3"/>
  <circle cx="160" cy="42" r="7" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <circle cx="240" cy="42" r="18" stroke="#E3F2FD" stroke-width="1.5" fill="#1E88E5" fill-opacity=".3"/>
  <circle cx="240" cy="42" r="7" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <g stroke="#E3F2FD" stroke-width="1">
    <line x1="160" y1="24" x2="160" y2="35"/><line x1="160" y1="49" x2="160" y2="60"/>
    <line x1="142" y1="42" x2="153" y2="42"/><line x1="167" y1="42" x2="178" y2="42"/>
    <line x1="240" y1="24" x2="240" y2="35"/><line x1="240" y1="49" x2="240" y2="60"/>
    <line x1="222" y1="42" x2="233" y2="42"/><line x1="247" y1="42" x2="258" y2="42"/>
  </g>
  <!-- Support frame -->
  <line x1="80" y1="180" x2="320" y2="180" stroke="#64B5F6" stroke-width="1.2"/>
  <rect x="90" y="180" width="6" height="40" rx="1" fill="#90CAF9" fill-opacity=".3"/>
  <rect x="304" y="180" width="6" height="40" rx="1" fill="#90CAF9" fill-opacity=".3"/>
  <!-- Pipes -->
  <rect x="55" y="110" width="25" height="8" rx="2" fill="#42A5F5" fill-opacity=".5"/>
  <rect x="320" y="110" width="25" height="8" rx="2" fill="#42A5F5" fill-opacity=".5"/>
</svg>
