<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="400" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A3A5C"/>
      <stop offset="100%" stop-color="#2A5F85"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg2)"/>
  <g stroke="#fff" stroke-opacity=".04" stroke-width="1">
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
  </g>
  <!-- Main housing -->
  <rect x="80" y="55" width="240" height="130" rx="6" fill="#1565C0" fill-opacity=".35" stroke="#64B5F6" stroke-width="1.5"/>
  <!-- Coil section -->
  <g stroke="#90CAF9" stroke-opacity=".4" stroke-width="1">
    <path d="M100 70 Q120 80 100 90 Q80 100 100 110 Q120 120 100 130 Q80 140 100 150 Q120 160 100 170"/>
    <path d="M130 70 Q150 80 130 90 Q110 100 130 110 Q150 120 130 130 Q110 140 130 150 Q150 160 130 170"/>
    <path d="M160 70 Q180 80 160 90 Q140 100 160 110 Q180 120 160 130 Q140 140 160 150 Q180 160 160 170"/>
  </g>
  <!-- Fan -->
  <circle cx="260" cy="120" r="35" stroke="#E3F2FD" stroke-width="1.5" fill="#1E88E5" fill-opacity=".25"/>
  <circle cx="260" cy="120" r="14" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <g stroke="#E3F2FD" stroke-width="1.2">
    <line x1="260" y1="85" x2="260" y2="106"/><line x1="260" y1="134" x2="260" y2="155"/>
    <line x1="225" y1="120" x2="246" y2="120"/><line x1="274" y1="120" x2="295" y2="120"/>
    <line x1="235" y1="95" x2="250" y2="108"/><line x1="270" y1="132" x2="285" y2="145"/>
    <line x1="285" y1="95" x2="270" y2="108"/><line x1="250" y1="132" x2="235" y2="145"/>
  </g>
  <!-- Pump unit -->
  <rect x="100" y="185" width="60" height="35" rx="4" fill="#0D47A1" fill-opacity=".5" stroke="#42A5F5" stroke-width="1"/>
  <circle cx="130" cy="202" r="10" stroke="#90CAF9" stroke-width="1.2" fill="#1E88E5" fill-opacity=".3"/>
  <!-- Pipes connecting pump -->
  <line x1="130" y1="185" x2="130" y2="170" stroke="#42A5F5" stroke-width="2" stroke-opacity=".6"/>
  <line x1="160" y1="202" x2="200" y2="202" stroke="#42A5F5" stroke-width="2" stroke-opacity=".6"/>
  <line x1="200" y1="202" x2="200" y2="185" stroke="#42A5F5" stroke-width="2" stroke-opacity=".6"/>
  <!-- Inlet/outlet -->
  <rect x="60" y="100" width="20" height="12" rx="2" fill="#42A5F5" fill-opacity=".5"/>
  <rect x="60" y="140" width="20" height="12" rx="2" fill="#42A5F5" fill-opacity=".5"/>
  <!-- Glow -->
  <ellipse cx="200" cy="45" rx="140" ry="35" fill="#fff" fill-opacity=".03"/>
</svg>
