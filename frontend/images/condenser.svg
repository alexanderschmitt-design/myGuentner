<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="400" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B1A1A"/>
      <stop offset="50%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg5)"/>
  <g stroke="#fff" stroke-opacity=".04" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="180" x2="400" y2="180"/>
  </g>
  <!-- Condenser housing -->
  <rect x="60" y="45" width="280" height="150" rx="5" fill="#1565C0" fill-opacity=".3" stroke="#64B5F6" stroke-width="1.5"/>
  <!-- Güntner text watermark -->
  <text x="200" y="135" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="38" font-weight="700" fill="#fff" fill-opacity=".12" letter-spacing="2">Güntner</text>
  <!-- Condenser coils -->
  <g stroke="#90CAF9" stroke-opacity=".35" stroke-width="1">
    <path d="M80 60 C100 60 100 80 80 80 C60 80 60 100 80 100 C100 100 100 120 80 120 C60 120 60 140 80 140 C100 140 100 160 80 160 C60 160 60 180 80 180"/>
    <path d="M120 60 C140 60 140 80 120 80 C100 80 100 100 120 100 C140 100 140 120 120 120 C100 120 100 140 120 140 C140 140 140 160 120 160 C100 160 100 180 120 180"/>
  </g>
  <!-- Two large fans -->
  <circle cx="240" cy="90" r="30" stroke="#E3F2FD" stroke-width="1.5" fill="#0D47A1" fill-opacity=".3"/>
  <circle cx="240" cy="90" r="12" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <circle cx="310" cy="150" r="30" stroke="#E3F2FD" stroke-width="1.5" fill="#0D47A1" fill-opacity=".3"/>
  <circle cx="310" cy="150" r="12" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <!-- Fan blades -->
  <g stroke="#E3F2FD" stroke-width="1.2">
    <line x1="240" y1="60" x2="240" y2="78"/><line x1="240" y1="102" x2="240" y2="120"/>
    <line x1="210" y1="90" x2="228" y2="90"/><line x1="252" y1="90" x2="270" y2="90"/>
    <line x1="310" y1="120" x2="310" y2="138"/><line x1="310" y1="162" x2="310" y2="180"/>
    <line x1="280" y1="150" x2="298" y2="150"/><line x1="322" y1="150" x2="340" y2="150"/>
  </g>
  <!-- Frame legs -->
  <rect x="75" y="195" width="6" height="30" rx="1" fill="#90CAF9" fill-opacity=".3"/>
  <rect x="319" y="195" width="6" height="30" rx="1" fill="#90CAF9" fill-opacity=".3"/>
  <!-- Pipe connections -->
  <rect x="35" y="85" width="25" height="10" rx="2" fill="#EF5350" fill-opacity=".4"/>
  <rect x="35" y="145" width="25" height="10" rx="2" fill="#42A5F5" fill-opacity=".5"/>
</svg>
