<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="400" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E3D5E"/>
      <stop offset="100%" stop-color="#2C6694"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg3)"/>
  <g stroke="#fff" stroke-opacity=".04" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="100" y1="0" x2="100" y2="240"/><line x1="200" y1="0" x2="200" y2="240"/><line x1="300" y1="0" x2="300" y2="240"/>
  </g>
  <!-- Main unit housing -->
  <rect x="50" y="50" width="300" height="140" rx="5" fill="#1565C0" fill-opacity=".3" stroke="#64B5F6" stroke-width="1.5"/>
  <!-- Three fan openings -->
  <circle cx="120" cy="120" r="38" stroke="#E3F2FD" stroke-width="1.5" fill="#0D47A1" fill-opacity=".3"/>
  <circle cx="120" cy="120" r="16" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <circle cx="200" cy="120" r="38" stroke="#E3F2FD" stroke-width="1.5" fill="#0D47A1" fill-opacity=".3"/>
  <circle cx="200" cy="120" r="16" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <circle cx="280" cy="120" r="38" stroke="#E3F2FD" stroke-width="1.5" fill="#0D47A1" fill-opacity=".3"/>
  <circle cx="280" cy="120" r="16" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <!-- Fan blades for each -->
  <g stroke="#E3F2FD" stroke-width="1">
    <line x1="120" y1="82" x2="120" y2="104"/><line x1="120" y1="136" x2="120" y2="158"/>
    <line x1="82" y1="120" x2="104" y2="120"/><line x1="136" y1="120" x2="158" y2="120"/>
    <line x1="200" y1="82" x2="200" y2="104"/><line x1="200" y1="136" x2="200" y2="158"/>
    <line x1="162" y1="120" x2="184" y2="120"/><line x1="216" y1="120" x2="238" y2="120"/>
    <line x1="280" y1="82" x2="280" y2="104"/><line x1="280" y1="136" x2="280" y2="158"/>
    <line x1="242" y1="120" x2="264" y2="120"/><line x1="296" y1="120" x2="318" y2="120"/>
  </g>
  <!-- Top grill lines -->
  <g stroke="#90CAF9" stroke-opacity=".3" stroke-width=".8">
    <line x1="60" y1="58" x2="340" y2="58"/><line x1="60" y1="63" x2="340" y2="63"/>
    <line x1="60" y1="68" x2="340" y2="68"/><line x1="60" y1="73" x2="340" y2="73"/>
  </g>
  <!-- Mounting brackets -->
  <rect x="80" y="190" width="10" height="30" rx="1" fill="#90CAF9" fill-opacity=".3"/>
  <rect x="310" y="190" width="10" height="30" rx="1" fill="#90CAF9" fill-opacity=".3"/>
  <!-- Pipes -->
  <rect x="30" y="108" width="20" height="8" rx="2" fill="#42A5F5" fill-opacity=".5"/>
  <rect x="30" y="132" width="20" height="8" rx="2" fill="#42A5F5" fill-opacity=".5"/>
</svg>
