<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="400" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#263F57"/>
      <stop offset="100%" stop-color="#3B7AB5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg4)"/>
  <g stroke="#fff" stroke-opacity=".04" stroke-width="1">
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="180" x2="400" y2="180"/>
  </g>
  <!-- V-shape coil structure -->
  <path d="M200 40 L80 170 L80 190 L200 100 Z" fill="#1565C0" fill-opacity=".3" stroke="#64B5F6" stroke-width="1.5"/>
  <path d="M200 40 L320 170 L320 190 L200 100 Z" fill="#1565C0" fill-opacity=".3" stroke="#64B5F6" stroke-width="1.5"/>
  <!-- Coil lines left -->
  <g stroke="#90CAF9" stroke-opacity=".35" stroke-width=".8">
    <line x1="180" y1="55" x2="92" y2="170"/><line x1="170" y1="55" x2="95" y2="165"/>
    <line x1="160" y1="60" x2="98" y2="160"/><line x1="150" y1="65" x2="100" y2="155"/>
    <line x1="140" y1="70" x2="102" y2="150"/>
  </g>
  <!-- Coil lines right -->
  <g stroke="#90CAF9" stroke-opacity=".35" stroke-width=".8">
    <line x1="220" y1="55" x2="308" y2="170"/><line x1="230" y1="55" x2="305" y2="165"/>
    <line x1="240" y1="60" x2="302" y2="160"/><line x1="250" y1="65" x2="300" y2="155"/>
    <line x1="260" y1="70" x2="298" y2="150"/>
  </g>
  <!-- Top fans -->
  <circle cx="160" cy="50" r="20" stroke="#E3F2FD" stroke-width="1.5" fill="#1E88E5" fill-opacity=".3"/>
  <circle cx="160" cy="50" r="8" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <circle cx="240" cy="50" r="20" stroke="#E3F2FD" stroke-width="1.5" fill="#1E88E5" fill-opacity=".3"/>
  <circle cx="240" cy="50" r="8" stroke="#E3F2FD" stroke-width="1" fill="none"/>
  <!-- Fan blades -->
  <g stroke="#E3F2FD" stroke-width="1">
    <line x1="160" y1="30" x2="160" y2="42"/><line x1="160" y1="58" x2="160" y2="70"/>
    <line x1="140" y1="50" x2="152" y2="50"/><line x1="168" y1="50" x2="180" y2="50"/>
    <line x1="240" y1="30" x2="240" y2="42"/><line x1="240" y1="58" x2="240" y2="70"/>
    <line x1="220" y1="50" x2="232" y2="50"/><line x1="248" y1="50" x2="260" y2="50"/>
  </g>
  <!-- Support legs -->
  <rect x="90" y="190" width="6" height="35" rx="1" fill="#90CAF9" fill-opacity=".3"/>
  <rect x="304" y="190" width="6" height="35" rx="1" fill="#90CAF9" fill-opacity=".3"/>
  <!-- Base frame -->
  <line x1="80" y1="190" x2="320" y2="190" stroke="#64B5F6" stroke-width="1.5"/>
  <!-- Pipe connections -->
  <rect x="55" y="160" width="25" height="8" rx="2" fill="#42A5F5" fill-opacity=".5"/>
  <rect x="320" y="160" width="25" height="8" rx="2" fill="#42A5F5" fill-opacity=".5"/>
</svg>
